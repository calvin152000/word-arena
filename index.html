<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Arena</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080818;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#cabinet {
  position: relative;
  background: linear-gradient(170deg, #181830 0%, #0d0d20 60%, #12122a 100%);
  border-radius: 20px 20px 14px 14px;
  padding: 20px 26px 24px;
  border: 2px solid #252550;
  box-shadow:
    0 0 0 4px #09091c,
    0 0 0 6px #1c1c40,
    0 10px 50px rgba(0,0,0,0.9),
    inset 0 1px 0 rgba(80,80,180,0.12);
}

#screen-wrap {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  box-shadow:
    0 0 0 3px #04040e,
    0 0 0 5px #18184a,
    0 0 40px rgba(0,180,255,0.15),
    inset 0 0 80px rgba(0,0,0,0.6);
}

canvas {
  display: block;
  width: 600px;
  height: 700px;
}

#scanlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 10px;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.1) 2px,
    rgba(0,0,0,0.1) 4px
  );
}

#vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 10px;
  background: radial-gradient(ellipse at center,
    transparent 50%,
    rgba(0,0,15,0.55) 78%,
    rgba(0,0,8,0.9) 100%
  );
}

#cab-footer {
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #2a2a55;
  margin-top: 10px;
  letter-spacing: 3px;
}

#cab-deco {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 18px;
  margin-top: 8px;
}
.slot { width: 38px; height: 4px; background: #0a0a1e; border-radius: 2px; border: 1px solid #222244; }
.led { width: 7px; height: 7px; border-radius: 50%; animation: led 2s ease-in-out infinite alternate; }
.led.a { background:#00e5cc; box-shadow:0 0 7px #00e5cc; animation-delay:0s; }
.led.b { background:#4488ff; box-shadow:0 0 7px #4488ff; animation-delay:.7s; }
.led.c { background:#bb66ff; box-shadow:0 0 7px #bb66ff; animation-delay:1.3s; }
@keyframes led { from{opacity:.25} to{opacity:1} }
</style>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

    <div class="slot"></div>
    <div class="led b"></div>
    <div class="slot"></div>

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.52;
  bgmGain    = audioCtx.createGain(); bgmGain.gain.value    = 0.18;
  sfxGain    = audioCtx.createGain(); sfxGain.gain.value    = 0.55;
  sfxLP = audioCtx.createBiquadFilter();
  sfxLP.type = "lowpass"; sfxLP.frequency.value = 2400; sfxLP.Q.value = 0.5;
  sfxGain.connect(sfxLP); sfxLP.connect(masterGain);
  reverbGain  = audioCtx.createGain(); reverbGain.gain.value  = 0.18;
  reverbDelay = audioCtx.createDelay(1.0); reverbDelay.delayTime.value = 0.32;
  reverbFB    = audioCtx.createGain(); reverbFB.gain.value    = 0.32;
  reverbLP    = audioCtx.createBiquadFilter();
  reverbLP.type = "lowpass"; reverbLP.frequency.value = 1800;
  reverbDelay.connect(reverbLP); reverbLP.connect(reverbFB); reverbFB.connect(reverbDelay);
  reverbDelay.connect(reverbGain); reverbGain.connect(masterGain);
  bgmDirect = audioCtx.createGain(); bgmDirect.gain.value = 0.72;
  bgmGain.connect(bgmDirect); bgmDirect.connect(masterGain);
  bgmGain.connect(reverbDelay);
  masterGain.connect(audioCtx.destination);
  leadGain    = audioCtx.createGain(); leadGain.gain.value    = 0.52;
  counterGain = audioCtx.createGain(); counterGain.gain.value = 0.28;
  bassGain    = audioCtx.createGain(); bassGain.gain.value    = 0.40;
  arpGain     = audioCtx.createGain(); arpGain.gain.value     = 0.08;
  [leadGain, counterGain, bassGain, arpGain].forEach(g => g.connect(bgmGain));
}

function softTone(freq, dur=0.12, vol=0.5, pitchEnd=0){
  if(!soundEnabled || !audioReady) return;
  try {
    const now = audioCtx.currentTime;
    const osc  = audioCtx.createOscillator();
    const harm = audioCtx.createOscillator();
    const env  = audioCtx.createGain();
    const lp   = audioCtx.createBiquadFilter();
    lp.type="lowpass"; lp.frequency.value=1600;
    osc.connect(lp); harm.connect(lp); lp.connect(env); env.connect(sfxGain);
    osc.type  = "triangle"; osc.frequency.setValueAtTime(freq, now);
    harm.type = "sine";     harm.frequency.setValueAtTime(freq*0.5, now);
    if(pitchEnd && pitchEnd !== freq){
      osc.frequency.exponentialRampToValueAtTime(pitchEnd, now+dur);
      harm.frequency.exponentialRampToValueAtTime(pitchEnd*0.5, now+dur);
    }
    const atk = Math.min(0.012, dur*0.12);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(vol, now+atk);
    env.gain.setValueAtTime(vol*0.7, now+dur*0.5);
    env.gain.linearRampToValueAtTime(0, now+dur+0.02);
    osc.start(now);  osc.stop(now+dur+0.03);
    harm.start(now); harm.stop(now+dur+0.03);
  } catch(e){}
}

let hoveredBtn = null;

const BPM  = 126;
const BEAT = 60 / BPM;

function n2f(n){ return 440 * Math.pow(2, (n - 69) / 12); }
const NOTE = {};
['C','D','E','F','G','A','B'].forEach((l,i)=>{
  const semi = [0,2,4,5,7,9,11][i];
  for(let o=0;o<9;o++){
    NOTE[l+o]    = (o+1)*12 + semi;
    NOTE[l+'#'+o]= (o+1)*12 + semi + 1;
    NOTE[l+'b'+o]= (o+1)*12 + semi - 1;
  }
});
function hz(name){ return n2f(NOTE[name]); }

  [hz('C5'),0.5],[hz('E5'),0.5],[hz('G5'),0.5],[hz('A5'),0.5],[hz('B4'),1],[hz('D5'),0.5],[hz('G4'),0.5],
  [hz('C6'),0.25],[hz('B5'),0.25],[hz('A5'),0.5],[hz('G5'),0.5],[hz('F5'),0.5],

  [hz('A5'),1],[hz('E5'),0.5],[hz('C5'),0.5],[hz('G5'),0.5],[hz('E5'),0.5],[hz('D5'),0.5],[hz('C5'),0.5],
  [hz('E5'),0.5],[hz('G5'),0.25],[hz('A5'),0.25],[hz('G5'),0.5],[hz('E5'),0.5],[hz('C5'),1.5],[0,0.5],

  [hz('C5'),0.5],[hz('E5'),0.25],[hz('F5'),0.25],[hz('E5'),0.5],[hz('D5'),0.5],[hz('A4'),1.5],[0,0.5],

function buildArp(){
  const chords = [
    [hz('A4'),hz('C5'),hz('E5'),hz('A5')],[hz('F4'),hz('A4'),hz('C5'),hz('F5')],
    [hz('C4'),hz('E4'),hz('G4'),hz('C5')],[hz('G4'),hz('B4'),hz('D5'),hz('G5')],
  ];
  const out = [];
  for(let rep=0; rep<4; rep++){
    chords.forEach(ch=>{ for(let b=0; b<4; b++){ ch.forEach(f=> out.push([f, 0.25])); } });
  }
  return out;
}
const ARP = buildArp();

  [hz('A5'),0.5],[hz('G5'),0.5],[hz('F5'),0.5],[hz('E5'),0.5],
  [hz('D5'),0.5],[hz('E5'),0.5],[hz('F5'),0.5],[hz('D5'),0.5],
  [hz('E5'),0.5],[hz('C5'),0.5],[hz('D5'),0.5],[hz('B4'),0.5],
  [hz('C5'),1],[hz('G5'),0.5],[hz('E5'),0.5],
  [hz('A5'),0.5],[hz('A5'),0.25],[hz('G5'),0.25],[hz('F5'),0.5],[hz('E5'),0.5],
  [hz('D5'),0.5],[hz('C5'),0.5],[hz('B4'),0.5],[hz('A4'),0.5],

  [hz('A2'),0.5],[0,0.25],[hz('A2'),0.25],[hz('C3'),0.5],[hz('E3'),0.5],

];

function scheduleKick(t){
  if(!soundEnabled || !audioReady) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.connect(g); g.connect(bgmGain); osc.type = "sine";
  osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(45, t+0.18);
  g.gain.setValueAtTime(0.55, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.22);
  osc.start(t); osc.stop(t+0.24);
}
function scheduleSnare(t){
  if(!soundEnabled || !audioReady) return;
  const len = Math.floor(audioCtx.sampleRate * 0.12);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1 - i/len);
  const src = audioCtx.createBufferSource(), flt = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
  flt.type = "bandpass"; flt.frequency.value = 2800; flt.Q.value = 0.7;
  src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(0.30, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  src.start(t); src.stop(t+0.14);
}
function scheduleHihat(t, open=false){
  if(!soundEnabled || !audioReady) return;
  const len = Math.floor(audioCtx.sampleRate*(open?0.12:0.03));
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src = audioCtx.createBufferSource(), flt = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
  flt.type="highpass"; flt.frequency.value=9000;
  src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(open?0.12:0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t+(open?0.12:0.03));
  src.start(t); src.stop(t+(open?0.14:0.04));
}
function scheduleDrums(startTime, bars=2){
  const barLen = 4 * BEAT;
  for(let b=0;b<bars;b++){
    const t = startTime + b*barLen;
    [0,2].forEach(beat => scheduleKick(t+beat*BEAT));
    [1,3].forEach(beat => scheduleSnare(t+beat*BEAT));
    for(let h=0;h<8;h++) scheduleHihat(t+h*0.5*BEAT, h===3||h===7);
  }
}

function scheduleNote(freq, startT, dur, type, gainNode, vol=1.0, vibHz=0){
  if(!soundEnabled || !audioReady || freq<=0) return;
  const osc = audioCtx.createOscillator(), env = audioCtx.createGain();
  osc.connect(env); env.connect(gainNode); osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  if(vibHz > 0){
    const lfo = audioCtx.createOscillator(), lfoG = audioCtx.createGain(); lfoG.gain.value = vibHz;
    lfo.frequency.value = 5.5; lfo.connect(lfoG); lfoG.connect(osc.frequency);
    lfo.start(startT); lfo.stop(startT+dur+0.02);
  }
  const atk = Math.min(0.015, dur*0.1), rel = Math.min(0.06, dur*0.25);
  env.gain.setValueAtTime(0, startT); env.gain.linearRampToValueAtTime(vol, startT+atk);
  env.gain.setValueAtTime(vol, startT+dur-rel); env.gain.linearRampToValueAtTime(0, startT+dur+0.01);
  osc.start(startT); osc.stop(startT+dur+0.02);
}

function schedulePattern(pattern, startTime, type, gainNode, vol=1.0, vibHz=0){
  let t = startTime;
  pattern.forEach(([freq, beats])=>{
    const dur = beats * BEAT;
    scheduleNote(freq, t, dur, type, gainNode, vol, vibHz);
    t += dur;
  });
  return t - startTime;
}

const LOBBY_BEATS = LEAD.reduce((s,[,b])=>s+b, 0);
const LOBBY_DUR   = LOBBY_BEATS * BEAT;
const GAME_BEATS = GAME_LEAD.reduce((s,[,b])=>s+b, 0);
const GAME_DUR   = GAME_BEATS * BEAT;

let bgmState = null, bgmLoopTimer = null, scheduledUntil = 0;

function startBGM(track){
  if(!audioReady) return;
  if(bgmState === track) return;
  stopBGM(); bgmState = track;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(soundEnabled ? 0.18 : 0, audioCtx.currentTime);
  scheduledUntil = audioCtx.currentTime + 0.05;
  scheduleBGMChunk();
}
function stopBGM(){
  bgmState = null;
  if(bgmLoopTimer){ clearTimeout(bgmLoopTimer); bgmLoopTimer=null; }
  if(!audioReady) return;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.08);
}
function scheduleBGMChunk(){
  if(!bgmState || !audioReady) return;
  const LOOKAHEAD = 2.5, now = audioCtx.currentTime;
  while(scheduledUntil < now + LOOKAHEAD){
    const t = scheduledUntil;
    if(bgmState === "menu"){
      schedulePattern(LEAD,    t, "square",   leadGain,    1.0, 3.5);
      schedulePattern(COUNTER, t, "triangle", counterGain, 1.0, 2.0);
      schedulePattern(BASS,    t, "sawtooth", bassGain,    1.0, 0);
      schedulePattern(ARP,     t, "sine",     arpGain,     1.0, 0);
      scheduledUntil = t + LOBBY_DUR;
    } else if(bgmState === "game"){
      schedulePattern(GAME_LEAD, t, "square",   leadGain, 1.0, 2);
      schedulePattern(GAME_BASS, t, "sawtooth", bassGain, 1.0, 0);
      scheduleDrums(t, 2);
      scheduledUntil = t + GAME_DUR;
    }
  }
  bgmLoopTimer = setTimeout(scheduleBGMChunk, 600);
}
function applyMuteState(){
  if(!audioReady) return;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(soundEnabled ? 0.18 : 0, audioCtx.currentTime);
  if(soundEnabled && bgmState && !bgmLoopTimer){ scheduledUntil = audioCtx.currentTime + 0.05; scheduleBGMChunk(); }
}

// ── REAL MULTIPLAYER via PeerJS ───────────────────────────────────────────────
let myPeer = null;
let hostConn = null;
let guestConns = [];
let myPlayerId = Math.random().toString(36).slice(2,8).toUpperCase();
let lobbyPeers = {};

function generateCode(){ return Math.random().toString(36).substring(2,7).toUpperCase(); }

async function hostGame(){
  lobby.code = generateCode();
  lobby.players = 1;
  lobby.role = "host";
  lobbyPeers = {};
  lobbyPeers[myPlayerId] = { name: username||"HOST", ready:true };
  state = "lobby_wait";

  if(myPeer){ myPeer.destroy(); }
  myPeer = new Peer("wArena-"+lobby.code);
  myPeer.on("open", ()=>{
    myPeer.on("connection", (conn)=>{
      conn.on("open", ()=>{
        guestConns.push(conn);
        conn.on("data", (data)=>{
          if(data.type==="gamestate") onGameMsg(data);
          else onLobbyMsg(data, conn);
        });
        conn.send({ type:"welcome", from:myPlayerId, name:username||"HOST",
                    peers: Object.entries(lobbyPeers).map(([id,p])=>({id,name:p.name})) });
      });
      conn.on("close", ()=>{
        guestConns = guestConns.filter(c=>c!==conn);
      });
    });
  });
  myPeer.on("error", (e)=> console.warn("PeerJS host error:", e));
}

// FIX: joinError state tracked as an object to avoid brittle string comparison
let joinInput="", joinErrorMsg="", joinConnecting=false;

function joinGame(){ joinInput=""; joinErrorMsg=""; joinConnecting=false; state="joingame"; }

async function submitJoinCode(){
  const val = joinInput.toUpperCase().trim();
  if(val.length < 3){ joinErrorMsg="ENTER A CODE!"; sfxMiss(); return; }
  joinConnecting = true;
  joinErrorMsg = "";
  lobby.code = val;
  lobby.role = "join";
  lobbyPeers = {};
  lobbyPeers[myPlayerId] = { name: username||"P2", ready:true };

  if(myPeer){ myPeer.destroy(); }
  myPeer = new Peer();
  myPeer.on("open", ()=>{
    hostConn = myPeer.connect("wArena-"+val, { reliable:true });
    hostConn.on("open", ()=>{
      joinConnecting = false;
      joinErrorMsg = "";
      state = "lobby_wait";
      hostConn.send({ type:"join", from:myPlayerId, name:username||"P2" });
      hostConn.on("data", (data)=>{
        if(data.type==="gamestate") onGameMsg(data);
        else onLobbyMsg(data, hostConn);
      });
    });
    hostConn.on("error", ()=>{ joinConnecting=false; joinErrorMsg="CANNOT CONNECT!"; sfxMiss(); });
    hostConn.on("close", ()=>{ joinConnecting=false; joinErrorMsg="HOST DISCONNECTED"; });
  });
  myPeer.on("error", (e)=>{
    joinConnecting=false; joinErrorMsg = "CANNOT CONNECT!"; sfxMiss();
    console.warn("PeerJS join error:", e);
  });

  // FIX: Timeout uses joinConnecting flag instead of string comparison
  setTimeout(()=>{ if(joinConnecting){ joinConnecting=false; joinErrorMsg="TIMEOUT - CHECK CODE"; sfxMiss(); } }, 8000);
}

function onLobbyMsg(data, fromConn){
  const { type, from, name, peers } = data;

  if(type==="welcome"){
    if(peers) peers.forEach(p=>{ if(p.id!==myPlayerId) lobbyPeers[p.id]={name:p.name,ready:true}; });
    lobbyPeers[from] = { name:name||"HOST", ready:true };
    lobby.players = Object.keys(lobbyPeers).length;
    sfxPlayerJoin();

  } else if(type==="join"){
    if(!lobbyPeers[from]) sfxPlayerJoin();
    lobbyPeers[from] = { name:name||from, ready:true };
    lobby.players = Object.keys(lobbyPeers).length;
    broadcastLobby({ type:"joined", from, name, total:lobby.players });
    if(lobby.players >= lobby.required){ sfxLobbyReady(); checkLobbyStart(); }

  } else if(type==="joined"){
    if(!lobbyPeers[from]) lobbyPeers[from] = { name:name||from, ready:true };
    lobby.players = data.total || Object.keys(lobbyPeers).length;
    sfxPlayerJoin();
    if(lobby.players >= lobby.required) sfxLobbyReady();

  } else if(type==="start"){
    if(lobby.role==="join") startGame(data.diff||"medium", lobby.required);

  } else if(type==="leave"){
    delete lobbyPeers[from];
    lobby.players = Object.keys(lobbyPeers).length;
  }
}

function broadcastLobby(data){
  guestConns.forEach(c=>{ try{ c.send(data); }catch(e){} });
}

function checkLobbyStart(){
  if(lobby.players >= lobby.required){
    broadcastLobby({ type:"start", diff:"medium" });
    startGame("medium", lobby.required);
  }
}

function leaveLobbyChannel(){
  broadcastLobby({ type:"leave", from:myPlayerId });
  if(hostConn){ try{ hostConn.close(); }catch(e){} hostConn=null; }
  guestConns.forEach(c=>{ try{ c.close(); }catch(e){} }); guestConns=[];
  if(myPeer){ try{ myPeer.destroy(); }catch(e){} myPeer=null; }
  lobbyPeers={};
}

function isOnlineConnected(){
  return myPeer && myPeer.open;
}

let isOnlineGame = false;

// FIX: sendGameState now correctly identifies which player is "me" vs opponent
// rather than always assuming players[0] is the local player
let localPlayerIdx = 0; // set in startGame for online mode

function sendGameState(){
  if(!isOnlineGame) return;
  const me = players[localPlayerIdx];
  if(!me) return;
  const data = {
    type: "gamestate",
    score: me.score,
    combo: me.combo,
    dead: me.dead,
    rows: me.rows,
    falling: me.falling ? { text: me.falling.text, col: me.falling.col, y: me.falling.y } : null,
  };
  if(hostConn){ try{ hostConn.send(data); }catch(e){} }
  guestConns.forEach(c=>{ try{ c.send(data); }catch(e){} });
}

function onGameMsg(data){
  if(data.type !== "gamestate") return;
  // FIX: opponent index is whichever player is NOT the local player
  const oppIdx = localPlayerIdx === 0 ? 1 : 0;
  const opp = players[oppIdx];
  if(!opp) return;
  opp.score = data.score;
  opp.combo = data.combo;
  opp.dead  = data.dead;
  opp.rows  = data.rows || [];
  if(data.falling){
    opp.falling = { text: data.falling.text, col: data.falling.col,
                    y: data.falling.y, speed: 0 };
  } else {
    opp.falling = null;
  }
  if(opp.dead && !players[localPlayerIdx].dead){
    setTimeout(()=>{ state="gameover_multi"; }, 1000);
  }
}

let singleTotalKeys=0, singleCorrectWords=0, singleWrongSubmits=0;
let singleNextWord=null;
let singleGameStartTime=0, singlePausedMs=0, singlePauseStartTime=0;

function pickNextWord(){
  const pool=WORDS[difficulty]||WORDS.easy;
  const col=Math.floor(Math.random()*COLS.length);
  const active=new Set();
  if(singleFalling) active.add(singleFalling.text);
  singleRows.forEach(r=>active.add(r.text));
  const available=pool.filter(w=>!active.has(w));
  const src=available.length>0?available:pool;
  return { text:src[Math.floor(Math.random()*src.length)], col, x:COLS[col] };
}

// ── START GAME ───────────────────────────────────────────────────────────────
function startGame(diff, numPlayers){
  state = "game"; difficulty = diff; playerCount = numPlayers || 1;
  paused = false;
  isOnlineGame = (numPlayers === 2 && isOnlineConnected());
  // FIX: set localPlayerIdx — host is always index 0, joiner is index 1
  localPlayerIdx = (lobby.role === "join") ? 1 : 0;
  resetAll();
  if(isOnlineGame && players.length >= 2){
    const peers = Object.entries(lobbyPeers).filter(([id])=>id!==myPlayerId);
    const oppIdx = localPlayerIdx === 0 ? 1 : 0;
    if(peers.length > 0) players[oppIdx].name = peers[0][1].name || "P2";
    players[localPlayerIdx].name = username ? username.toUpperCase() : "P1";
  }
  startBGM("game");
}

function resetAll(){
  singleRows=[]; singleFalling=null; singleTyped=""; singleScore=0; singleCombo=0;
  singleLastEscDanger=-1; singleEscFlashTimer=0; singleSpawnTimer=0; singleParticles=[];
  singleTotalKeys=0; singleCorrectWords=0; singleWrongSubmits=0;
  singleGameStartTime=Date.now(); singlePausedMs=0; singlePauseStartTime=0;
  // FIX: pickNextWord requires difficulty to be set — it is set in startGame before resetAll
  singleNextWord = difficulty ? pickNextWord() : null;
  players = [];
  for(let i=0; i<playerCount; i++){
    const pname = (i===0 && username) ? username.toUpperCase() : PLAYER_NAMES[i];
    players.push(makePlayerState(i, PLAYER_COLORS[i], pname, null));
  }
  activeTypingPlayer = 0;
  // FIX: reset lastStanding on every new game
  lastStanding = null; lastStandingTimer = 0;
}

function spawnParticles(arr, x, y, color, count=8){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2, spd=1.5+Math.random()*3;

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener("keydown",(e)=>{
  if(state==="splash" && splashPhase==="press"){
    if(!audioReady){ initAudio(); }
    audioCtx.resume().then(()=>{ sfxCoin(); });
    splashPhase="name"; return;
  }
  if(state==="splash" && splashPhase==="name"){
    if(!audioReady){ initAudio(); audioCtx.resume(); }
    if(e.key==="Backspace"){ usernameInput=usernameInput.slice(0,-1); usernameErr=""; sfxType(); return; }
    if(e.key==="Enter"){ confirmUsername(); return; }
    if(e.key==="Escape"){ splashPhase="press"; usernameInput=""; usernameErr=""; return; }
    if(/^[a-zA-Z0-9 _-]$/.test(e.key) && usernameInput.length<12){ usernameInput+=e.key; usernameErr=""; sfxType(); }
    return;
  }
  if(!audioReady){ initAudio(); audioCtx.resume().then(()=>{ startBGM("menu"); }); }
  else if(audioCtx && audioCtx.state === "suspended"){ audioCtx.resume(); }

  if(state==="howtoplay"){
    if(e.key==="Escape"||e.key==="Backspace"){ sfxBack(); state="menu"; howToPlayPage=0; return; }
    if(e.key==="ArrowRight"||e.key==="d"||e.key==="D"){ if(howToPlayPage<HTP_PAGES-1){ howToPlayPage++; sfxClick(); } return; }
    if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A"){ if(howToPlayPage>0){ howToPlayPage--; sfxClick(); } return; }
    return;
  }

  if(state==="joingame"){
    if(e.key==="Backspace"){ joinInput=joinInput.slice(0,-1); joinErrorMsg=""; return; }
    if(e.key==="Enter"){ submitJoinCode(); return; }
    if(e.key==="Escape"){ state="hostjoin"; joinConnecting=false; return; }
    if(/^[a-zA-Z0-9]$/.test(e.key)&&joinInput.length<8){ joinInput+=e.key.toUpperCase(); joinErrorMsg=""; }
    return;
  }

  if(state!=="game") return;

  if(e.key === "Tab" && playerCount > 1){
    e.preventDefault();
    activeTypingPlayer = (activeTypingPlayer + 1) % playerCount;
    sfxClick(); return;
  }

  if(playerCount === 1){
    if(e.key==="Escape"){
      paused = !paused;
      if(paused){
        singlePauseStartTime=Date.now();
        bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.15);
      } else {
        singlePausedMs+=Date.now()-singlePauseStartTime;
        bgmGain.gain.linearRampToValueAtTime(soundEnabled?0.18:0, audioCtx.currentTime+0.15);
      }
      sfxClick(); return;
    }
    if(paused) return;
    if(e.key==="Backspace") singleTyped=singleTyped.slice(0,-1);
    else if(e.key==="Enter") singleSubmit();
    else if(/^[a-zA-Z]$/.test(e.key)){ singleTyped+=e.key.toUpperCase(); singleTotalKeys++; sfxType(); }
  } else {
    const p = players[activeTypingPlayer];
    if(!p || p.dead) return;
    if(e.key==="Backspace") p.typed=p.typed.slice(0,-1);
    else if(e.key==="Enter") multiSubmit(p);
    else if(/^[a-zA-Z]$/.test(e.key)){ p.typed+=e.key.toUpperCase(); sfxType(); }
  }
});

function singleSubmit(){
  const val = singleTyped.toUpperCase();
  if(singleFalling && val===singleFalling.text){
    const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy;
    const esc=getEscalation(singleScore);
    const pts=Math.round(cfg.pts*(1+singleCombo*0.1)*(1+esc.danger*0.2));
    singleScore+=pts; singleCombo++; singleCorrectWords++;
    spawnParticles(singleParticles,singleFalling.x+40,singleFalling.y,C.teal,10);
    singleCombo>2?sfxCombo():sfxDestroy(); singleFalling=null; singleSpawnTimer=0; singleTyped=""; return;
  }
  const i=singleRows.findIndex(r=>r.text===val);
  if(i!==-1){
    const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy;
    const esc=getEscalation(singleScore);
    const pts=Math.round(cfg.pts*(1+singleCombo*0.1)*(1+esc.danger*0.2));
    singleScore+=pts; singleCombo++; singleCorrectWords++;
    spawnParticles(singleParticles,COLS[singleRows[i].col]+40,BOTTOM-i*ROW_H,C.green,8);
    singleRows.splice(i,1); singleCombo>2?sfxCombo():sfxDestroy();
  } else { singleCombo=0; singleWrongSubmits++; sfxMiss(); }
  singleTyped="";
}

function multiSubmit(p){
  const val = p.typed.toUpperCase();
  if(p.falling && val===p.falling.text){
    const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy;
    const esc=getEscalation(p.score);
    const pts=Math.round(cfg.pts*(1+p.combo*0.1)*(1+esc.danger*0.2));
    p.score+=pts; p.combo++;
    spawnParticles(p.particles, 40, p.falling.y, p.color, 10);
    p.combo>2?sfxCombo():sfxDestroy(); p.falling=null; p.spawnTimer=0; p.typed=""; return;
  }
  const i=p.rows.findIndex(r=>r.text===val);
  if(i!==-1){
    const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy;
    const esc=getEscalation(p.score);
    const pts=Math.round(cfg.pts*(1+p.combo*0.1)*(1+esc.danger*0.2));
    p.score+=pts; p.combo++; p.rows.splice(i,1); p.combo>2?sfxCombo():sfxDestroy();
    spawnParticles(p.particles, 40, 300, p.color, 8);
  } else { p.combo=0; sfxMiss(); }
  p.typed="";
}

// ── SPLIT SCREEN GAME ────────────────────────────────────────────────────────
function drawPane(p, px, py, pw, ph, pCols, pRowH, isActive, isRemote=false) {
  const pBottom = py + ph - 44;
  const pTop    = py + 36;

  ctx.save();
  ctx.beginPath(); ctx.rect(px, py, pw, ph); ctx.clip();

  const cfg = DIFF_CFG[difficulty]||DIFF_CFG.easy;
  const esc = getEscalation(p.score);

  if(esc.danger > p.lastEscDanger){
    p.lastEscDanger = esc.danger; p.escFlashTimer = 90; p.escFlashLabel = esc.label; sfxCombo();
  }
  if(esc.danger>=3){ const pulse=0.04+0.04*Math.sin(Date.now()*0.008); ctx.fillStyle=`rgba(255,20,50,${pulse})`; ctx.fillRect(px,py,pw,ph); }
  else if(esc.danger===2){ const pulse=0.02+0.02*Math.sin(Date.now()*0.005); ctx.fillStyle=`rgba(255,120,0,${pulse})`; ctx.fillRect(px,py,pw,ph); }

  const dynInterval = Math.max(30, cfg.spawnBase - p.score * 0.3);
  if(!isRemote){
    p.spawnTimer++;
    if(!p.falling && p.spawnTimer >= dynInterval){
      const esc2 = getEscalation(p.score);
      const speed = (cfg.baseSpeed + Math.random()*cfg.rand) * esc2.mult;
      const col = Math.floor(Math.random() * pCols.length);
      const pool2 = WORDS[difficulty]||WORDS.easy;
      const activeSet = new Set(p.rows.map(r=>r.text));
      if(p.falling) activeSet.add(p.falling.text);
      const avail2 = pool2.filter(w=>!activeSet.has(w));
      const src2 = avail2.length>0?avail2:pool2;
      p.falling = { text: src2[Math.floor(Math.random()*src2.length)], col, y: pTop, speed };
      p.spawnTimer = 0;
    }
  }

  for(let i=0;i<p.rows.length;i++){
    const r=p.rows[i];
    const wx = px + pCols[r.col % pCols.length];
    const wy = pBottom - i * pRowH;
    ctx.font=`10px ${PX}`; const tw=ctx.measureText(r.text).width;
    const dangerRatio=p.rows.length/12;
    const rowClr=dangerRatio>0.7?C.red:dangerRatio>0.4?C.amber:C.green;
    ctx.fillStyle=`rgba(0,180,120,${0.05+dangerRatio*0.1})`; ctx.fillRect(wx-5,wy-16,tw+10,20);
    ctx.strokeStyle=`rgba(${dangerRatio>0.7?"255,60,80":dangerRatio>0.4?"255,180,0":"0,230,150"},0.4)`;
    ctx.lineWidth=1; ctx.strokeRect(wx-5,wy-16,tw+10,20);
    pxDraw(r.text,wx,wy,rowClr,10,true);
  }

  if(p.falling && !isRemote){
    p.falling.y += p.falling.speed;
    const limit = pBottom - p.rows.length * pRowH;
    if(p.falling.y >= limit){
      p.rows.push({text:p.falling.text, col:p.falling.col}); sfxLand();
      spawnParticles(p.particles, px + pCols[p.falling.col % pCols.length] + 20, limit, C.amber, 5);
      p.falling = null; p.spawnTimer = 0;
      if(p.rows.length > 12) p.dead = true;
    }
  }
  if(p.falling){
    const fx = px + pCols[p.falling.col % pCols.length];
    ctx.font=`11px ${PX}`; const tw=ctx.measureText(p.falling.text).width;
    const wordClr=esc.danger>=3?C.red:esc.danger>=2?C.amber:p.color;
    ctx.fillStyle=`rgba(0,180,255,0.10)`; ctx.fillRect(fx-5,p.falling.y-18,tw+10,22);
    ctx.strokeStyle=`rgba(0,200,255,0.45)`; ctx.lineWidth=1; ctx.strokeRect(fx-5,p.falling.y-18,tw+10,22);
    pxDraw(p.falling.text,fx,p.falling.y,wordClr,11,true);
  }

  for(let i=p.particles.length-1;i>=0;i--){
    const pt=p.particles[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.12; pt.life-=0.04;
    if(pt.life<=0){ p.particles.splice(i,1); continue; }
    ctx.globalAlpha=pt.life; ctx.fillStyle=pt.color; ctx.fillRect(pt.x,pt.y,pt.size,pt.size);
  }
  ctx.globalAlpha=1;

  ctx.fillStyle="rgba(3,3,18,0.94)"; ctx.fillRect(px, py, pw, 36);
  ctx.fillStyle=isActive ? p.color : `rgba(${hexRgb(p.color)},0.4)`;
  ctx.fillRect(px, py+34, pw, 2);

  ctx.font=`7px ${PX}`;
  const nw=ctx.measureText(p.name).width;
  if(isActive){ ctx.shadowColor=p.color; ctx.shadowBlur=8; }
  ctx.fillStyle=isActive?p.color:`rgba(${hexRgb(p.color)},0.6)`;
  ctx.fillText(p.name, px + pw/2 - nw/2, py + 13);
  ctx.shadowBlur=0;

  ctx.font=`9px ${PX}`;
  pxDraw(`${p.score}`, px+6, py+28, C.amber, 9, false);

  if(p.combo > 1){
    ctx.font=`7px ${PX}`;
    const cs=`x${p.combo}`;
    const cw=ctx.measureText(cs).width;
    pxDraw(cs, px+pw-cw-6, py+28, p.combo>=5?C.amber:C.green, 7, false);
  }

  if(isActive){
    const t=Date.now()*0.006;
    const alpha=0.5+0.5*Math.sin(t);
    ctx.strokeStyle=`rgba(${hexRgb(p.color)},${alpha.toFixed(2)})`;
    ctx.lineWidth=2; ctx.strokeRect(px+1,py+1,pw-2,ph-2);
  }

  ctx.fillStyle="rgba(3,3,18,0.95)"; ctx.fillRect(px, py+ph-44, pw, 44);
  ctx.fillStyle=isActive ? p.color : `rgba(${hexRgb(p.color)},0.3)`;
  ctx.fillRect(px, py+ph-44, pw, 2);

  if(isActive && !isRemote){
    ctx.font=`8px ${PX}`;
    pxDraw(">",px+6,py+ph-16,"#2a4a6a",8,false);
    const cursor=Math.floor(Date.now()/400)%2===0?"_":" ";
    const display=p.typed+cursor;
    ctx.font=`9px ${PX}`;
    pxDraw(display,px+20,py+ph-16,p.color,9,true);
  } else if(isRemote){
    ctx.font=`7px ${PX}`;
    const lbl="● LIVE";
    const lw2=ctx.measureText(lbl).width;
    ctx.shadowColor=C.green; ctx.shadowBlur=Math.floor(Date.now()/400)%2===0?6:0;
    ctx.fillStyle=C.green; ctx.fillText(lbl, px+pw/2-lw2/2, py+ph-14);
    ctx.shadowBlur=0;
  } else {
    ctx.font=`7px ${PX}`;
    const hint="TAB to switch";
    const hw=ctx.measureText(hint).width;
    ctx.fillStyle="rgba(40,50,80,0.8)";
    ctx.fillText(hint, px+pw/2-hw/2, py+ph-14);
  }

  if(p.dead){
    ctx.fillStyle="rgba(0,0,0,0.72)"; ctx.fillRect(px,py,pw,ph);
    ctx.font=`11px ${PX}`; const dw=ctx.measureText("GAME OVER").width;
    pxDraw("GAME OVER",px+pw/2-dw/2,py+ph/2-10,C.red,11,true);
    ctx.font=`8px ${PX}`; const sw=ctx.measureText(`SCORE ${p.score}`).width;
    pxDraw(`SCORE ${p.score}`,px+pw/2-sw/2,py+ph/2+14,C.amber,8,false);
  }

  if(p.escFlashTimer > 0){
    p.escFlashTimer--;
    const alpha=Math.min(1,p.escFlashTimer/20);
    const flashClr=esc.danger>=3?"#ff2244":esc.danger>=2?"#ffaa00":p.color;
    ctx.globalAlpha=alpha;
    ctx.font=`11px ${PX}`; const fw=ctx.measureText(p.escFlashLabel).width;
    pxDraw(p.escFlashLabel, px+pw/2-fw/2, py+ph/2, flashClr, 11, true);
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

    // Everyone died simultaneously
    state = "gameover_multi";
    return;
  }
  if(alive.length === 1 && players.length > 1){
    // One player remains — show winner briefly then go to game over
    if(!lastStanding){
      lastStanding = alive[0];
      lastStandingTimer = 180; // ~3 seconds at 60fps
    }
  }
  // Count down and transition
  if(lastStanding){
    lastStandingTimer--;
    // Draw "WINNER!" overlay on the winning pane
    // (This is just a flag; actual rendering happens inside drawPane via p.dead checks)
    if(lastStandingTimer <= 0){
      state = "gameover_multi";
    }
  }
}

    const wy = 330 - i*28;
    ctx.font=`8px ${PX}`; const ww=ctx.measureText(w).width;
    ctx.fillStyle=`rgba(0,230,150,0.1)`; ctx.fillRect(380,wy-14,ww+8,18);
    ctx.strokeStyle=`rgba(0,230,150,0.35)`; ctx.lineWidth=1; ctx.strokeRect(380,wy-14,ww+8,18);
    pxDraw(w,380,wy,C.green,8,false);
  });
  const fy = 176 + ((Date.now()*0.04)%80);
  ctx.font=`9px ${PX}`; const fw=ctx.measureText("LOOP").width;
  ctx.fillStyle=`rgba(0,180,255,0.15)`; ctx.fillRect(380,fy-16,fw+8,22);
  ctx.strokeStyle=`rgba(0,200,255,0.5)`; ctx.lineWidth=1; ctx.strokeRect(380,fy-16,fw+8,22);
  pxDraw("LOOP",380,fy,C.teal,9,true);
  ctx.fillStyle="rgba(3,3,18,0.95)"; ctx.fillRect(372,316,198,24);
  ctx.fillStyle=C.teal; ctx.fillRect(372,316,198,2);
  const tc=Math.floor(Date.now()/500)%2===0?"_":" ";
  ctx.font=`7px ${PX}`; pxDraw("LOOP"+tc,380,334,C.teal,7,true);
  ctx.restore();

  htpBox(30, 352, 160, 52, C.green);
  htpLabel("HIT!", 46, 372, C.green, 9);
  ctx.font=`7px ${PX}`; ctx.fillStyle="#667799"; ctx.fillText("+POINTS+COMBO", 46, 390);

  htpBox(202, 352, 158, 52, C.red);
  htpLabel("MISS!", 218, 372, C.red, 9);
  ctx.font=`7px ${PX}`; ctx.fillStyle="#667799"; ctx.fillText("COMBO RESETS", 218, 390);

  htpBox(372, 352, 198, 52, "#334455");
  htpLabel("STACK FULL?", 388, 372, C.amber, 7);
  ctx.font=`7px ${PX}`; ctx.fillStyle="#667799"; ctx.fillText("GAME OVER!", 388, 390);
}

}

function loop(){
  bg();
  if(state==="splash")            drawSplash();
  else if(state==="menu")         menu();
  else if(state==="difficulty")   difficultyMenu();
  else if(state==="multiplayer")  multiMenu();
  else if(state==="hostjoin")     hostJoinMenu();
  else if(state==="joingame")     drawJoinGame();
  else if(state==="options")      drawOptions();
  else if(state==="howtoplay")    drawHowToPlay();
  else if(state==="lobby_wait")   lobbyWait();
  else if(state==="game"){
    if(playerCount === 1)       game();
    else if(playerCount === 2)  game2P();
    else if(playerCount === 4)  game4P();
  }
  else if(state==="gameover")       gameover();
  else if(state==="gameover_multi") gameover_multi();

  drawMusicIcon();

  if(state !== lastState && audioReady){
    if(["menu","difficulty","multiplayer","hostjoin","joingame","options","lobby_wait","howtoplay"].includes(state)) startBGM("menu");
    else if(state==="game") startBGM("game");
    lastState=state;
  }

  requestAnimationFrame(loop);
}

loop();
</script>
