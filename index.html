<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080818;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#cabinet {
  position: relative;
  background: linear-gradient(170deg, #181830 0%, #0d0d20 60%, #12122a 100%);
  border-radius: 20px 20px 14px 14px;
  padding: 20px 26px 24px;
  border: 2px solid #252550;
  box-shadow:
    0 0 0 4px #09091c,
    0 0 0 6px #1c1c40,
    0 10px 50px rgba(0,0,0,0.9),
    inset 0 1px 0 rgba(80,80,180,0.12);
}

#screen-wrap {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  box-shadow:
    0 0 0 3px #04040e,
    0 0 0 5px #18184a,
    0 0 40px rgba(0,180,255,0.15),
    inset 0 0 80px rgba(0,0,0,0.6);
}

canvas {
  display: block;
  width: 600px;
  height: 700px;
}

#scanlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 10px;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.1) 2px,
    rgba(0,0,0,0.1) 4px
  );
}

#vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 10px;
  background: radial-gradient(ellipse at center,
    transparent 50%,
    rgba(0,0,15,0.55) 78%,
    rgba(0,0,8,0.9) 100%
  );
}

#cab-footer {
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #2a2a55;
  margin-top: 10px;
  letter-spacing: 3px;
}

#cab-deco {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 18px;
  margin-top: 8px;
}
.slot { width: 38px; height: 4px; background: #0a0a1e; border-radius: 2px; border: 1px solid #222244; }
.led { width: 7px; height: 7px; border-radius: 50%; animation: led 2s ease-in-out infinite alternate; }
.led.a { background:#00e5cc; box-shadow:0 0 7px #00e5cc; animation-delay:0s; }
.led.b { background:#4488ff; box-shadow:0 0 7px #4488ff; animation-delay:.7s; }
.led.c { background:#bb66ff; box-shadow:0 0 7px #bb66ff; animation-delay:1.3s; }
@keyframes led { from{opacity:.25} to{opacity:1} }
</style>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.52;
  bgmGain    = audioCtx.createGain(); bgmGain.gain.value    = 0.18;
  sfxGain    = audioCtx.createGain(); sfxGain.gain.value    = 0.55;
  sfxLP = audioCtx.createBiquadFilter();
  sfxLP.type = "lowpass"; sfxLP.frequency.value = 2400; sfxLP.Q.value = 0.5;
  sfxGain.connect(sfxLP); sfxLP.connect(masterGain);
  reverbGain  = audioCtx.createGain(); reverbGain.gain.value  = 0.18;
  reverbDelay = audioCtx.createDelay(1.0); reverbDelay.delayTime.value = 0.32;
  reverbFB    = audioCtx.createGain(); reverbFB.gain.value    = 0.32;
  reverbLP    = audioCtx.createBiquadFilter();
  reverbLP.type = "lowpass"; reverbLP.frequency.value = 1800;
  reverbDelay.connect(reverbLP); reverbLP.connect(reverbFB); reverbFB.connect(reverbDelay);
  reverbDelay.connect(reverbGain); reverbGain.connect(masterGain);
  bgmDirect = audioCtx.createGain(); bgmDirect.gain.value = 0.72;
  bgmGain.connect(bgmDirect); bgmDirect.connect(masterGain);
  bgmGain.connect(reverbDelay);
  masterGain.connect(audioCtx.destination);
  leadGain    = audioCtx.createGain(); leadGain.gain.value    = 0.52;
  counterGain = audioCtx.createGain(); counterGain.gain.value = 0.28;
  bassGain    = audioCtx.createGain(); bassGain.gain.value    = 0.40;
  arpGain     = audioCtx.createGain(); arpGain.gain.value     = 0.08;
  [leadGain, counterGain, bassGain, arpGain].forEach(g => g.connect(bgmGain));
}

function softTone(freq, dur=0.12, vol=0.5, pitchEnd=0){
  if(!soundEnabled || !audioReady) return;
  try {
    const now = audioCtx.currentTime;
    const osc  = audioCtx.createOscillator();
    const harm = audioCtx.createOscillator();
    const env  = audioCtx.createGain();
    const lp   = audioCtx.createBiquadFilter();
    lp.type="lowpass"; lp.frequency.value=1600;
    osc.connect(lp); harm.connect(lp); lp.connect(env); env.connect(sfxGain);
    osc.type  = "triangle"; osc.frequency.setValueAtTime(freq, now);
    harm.type = "sine";     harm.frequency.setValueAtTime(freq*0.5, now);
    if(pitchEnd && pitchEnd !== freq){
      osc.frequency.exponentialRampToValueAtTime(pitchEnd, now+dur);
      harm.frequency.exponentialRampToValueAtTime(pitchEnd*0.5, now+dur);
    }
    const atk = Math.min(0.012, dur*0.12);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(vol, now+atk);
    env.gain.setValueAtTime(vol*0.7, now+dur*0.5);
    env.gain.linearRampToValueAtTime(0, now+dur+0.02);
    osc.start(now);  osc.stop(now+dur+0.03);
    harm.start(now); harm.stop(now+dur+0.03);
  } catch(e){}
}

const BPM  = 126;
const BEAT = 60 / BPM;

function n2f(n){ return 440 * Math.pow(2, (n - 69) / 12); }
const NOTE = {};
['C','D','E','F','G','A','B'].forEach((l,i)=>{
  const semi = [0,2,4,5,7,9,11][i];
  for(let o=0;o<9;o++){
    NOTE[l+o]    = (o+1)*12 + semi;
    NOTE[l+'#'+o]= (o+1)*12 + semi + 1;
    NOTE[l+'b'+o]= (o+1)*12 + semi - 1;
  }
});
function hz(name){ return n2f(NOTE[name]); }

function buildArp(){
  const chords = [
    [hz('A4'),hz('C5'),hz('E5'),hz('A5')],[hz('F4'),hz('A4'),hz('C5'),hz('F5')],
    [hz('C4'),hz('E4'),hz('G4'),hz('C5')],[hz('G4'),hz('B4'),hz('D5'),hz('G5')],
  ];
  const out = [];
  for(let rep=0; rep<4; rep++){
    chords.forEach(ch=>{ for(let b=0; b<4; b++){ ch.forEach(f=> out.push([f, 0.25])); } });
  }
  return out;
}

function scheduleKick(t){
  if(!soundEnabled || !audioReady) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.connect(g); g.connect(bgmGain); osc.type = "sine";
  osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(45, t+0.18);
  g.gain.setValueAtTime(0.55, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.22);
  osc.start(t); osc.stop(t+0.24);
}
function scheduleSnare(t){
  if(!soundEnabled || !audioReady) return;
  const len = Math.floor(audioCtx.sampleRate * 0.12);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1 - i/len);
  const src = audioCtx.createBufferSource(), flt = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
  flt.type = "bandpass"; flt.frequency.value = 2800; flt.Q.value = 0.7;
  src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(0.30, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  src.start(t); src.stop(t+0.14);
}
function scheduleHihat(t, open=false){
  if(!soundEnabled || !audioReady) return;
  const len = Math.floor(audioCtx.sampleRate*(open?0.12:0.03));
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src = audioCtx.createBufferSource(), flt = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
  flt.type="highpass"; flt.frequency.value=9000;
  src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(open?0.12:0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t+(open?0.12:0.03));
  src.start(t); src.stop(t+(open?0.14:0.04));
}
function scheduleDrums(startTime, bars=2){
  const barLen = 4 * BEAT;
  for(let b=0;b<bars;b++){
    const t = startTime + b*barLen;
    [0,2].forEach(beat => scheduleKick(t+beat*BEAT));
    [1,3].forEach(beat => scheduleSnare(t+beat*BEAT));
    for(let h=0;h<8;h++) scheduleHihat(t+h*0.5*BEAT, h===3||h===7);
  }
}

function scheduleNote(freq, startT, dur, type, gainNode, vol=1.0, vibHz=0){
  if(!soundEnabled || !audioReady || freq<=0) return;
  const osc = audioCtx.createOscillator(), env = audioCtx.createGain();
  osc.connect(env); env.connect(gainNode); osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  if(vibHz > 0){
    const lfo = audioCtx.createOscillator(), lfoG = audioCtx.createGain(); lfoG.gain.value = vibHz;
    lfo.frequency.value = 5.5; lfo.connect(lfoG); lfoG.connect(osc.frequency);
    lfo.start(startT); lfo.stop(startT+dur+0.02);
  }
  const atk = Math.min(0.015, dur*0.1), rel = Math.min(0.06, dur*0.25);
  env.gain.setValueAtTime(0, startT); env.gain.linearRampToValueAtTime(vol, startT+atk);
  env.gain.setValueAtTime(vol, startT+dur-rel); env.gain.linearRampToValueAtTime(0, startT+dur+0.01);
  osc.start(startT); osc.stop(startT+dur+0.02);
}

function schedulePattern(pattern, startTime, type, gainNode, vol=1.0, vibHz=0){
  let t = startTime;
  pattern.forEach(([freq, beats])=>{
    const dur = beats * BEAT;
    scheduleNote(freq, t, dur, type, gainNode, vol, vibHz);
    t += dur;
  });
  return t - startTime;
}

const LOBBY_BEATS = LEAD.reduce((s,[,b])=>s+b, 0);
const LOBBY_DUR   = LOBBY_BEATS * BEAT;
const GAME_BEATS = GAME_LEAD.reduce((s,[,b])=>s+b, 0);
const GAME_DUR   = GAME_BEATS * BEAT;

let bgmState = null, bgmLoopTimer = null, scheduledUntil = 0;

function startBGM(track){
  if(!audioReady) return;
  if(bgmState === track) return;
  stopBGM(); bgmState = track;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(soundEnabled ? 0.18 : 0, audioCtx.currentTime);
  scheduledUntil = audioCtx.currentTime + 0.05;
  scheduleBGMChunk();
}
function stopBGM(){
  bgmState = null;
  if(bgmLoopTimer){ clearTimeout(bgmLoopTimer); bgmLoopTimer=null; }
  if(!audioReady) return;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.08);
}
function scheduleBGMChunk(){
  if(!bgmState || !audioReady) return;
  const LOOKAHEAD = 2.5, now = audioCtx.currentTime;
  while(scheduledUntil < now + LOOKAHEAD){
    const t = scheduledUntil;
    if(bgmState === "menu"){
      schedulePattern(LEAD,    t, "square",   leadGain,    1.0, 3.5);
      schedulePattern(COUNTER, t, "triangle", counterGain, 1.0, 2.0);
      schedulePattern(BASS,    t, "sawtooth", bassGain,    1.0, 0);
      schedulePattern(ARP,     t, "sine",     arpGain,     1.0, 0);
      scheduledUntil = t + LOBBY_DUR;
    } else if(bgmState === "game"){
      schedulePattern(GAME_LEAD, t, "square",   leadGain, 1.0, 2);
      schedulePattern(GAME_BASS, t, "sawtooth", bassGain, 1.0, 0);
      scheduleDrums(t, 2);
      scheduledUntil = t + GAME_DUR;
    }
  }
  bgmLoopTimer = setTimeout(scheduleBGMChunk, 600);
}
function applyMuteState(){
  if(!audioReady) return;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(soundEnabled ? 0.18 : 0, audioCtx.currentTime);
  if(soundEnabled && bgmState && !bgmLoopTimer){ scheduledUntil = audioCtx.currentTime + 0.05; scheduleBGMChunk(); }
}

  if(!WORDS_BY_LENGTH[w.length]) WORDS_BY_LENGTH[w.length] = [];

});
const AVAILABLE_LENGTHS = Object.keys(WORDS_BY_LENGTH).map(Number).sort((a,b)=>a-b);

let multiGameSeed = 0;
let multiGameStartMs = 0;
let lastSpawnTick = -1;

function seededRand(seed){
  let t = seed + 0x6D2B79F5;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

function getSpawnSeedForTick(tick){
  return multiGameSeed * 1000 + tick * 7919;
}

function tickMultiSpawnCoordinator(){
  if(!multiGameStartMs) return;

  const elapsed = Date.now() - multiGameStartMs;

  const alive = players.filter(p=>!p.dead);
  if(alive.length > 0){
    multiRoundScore = alive.reduce((s,p)=>s+p.score,0) / alive.length;
  }
  multiSpawnInterval = Math.max(45, 130 - multiRoundScore * 0.25);

  const intervalMs = (multiSpawnInterval / 60) * 1000;
  const currentTick = Math.floor(elapsed / intervalMs);

  if(currentTick <= lastSpawnTick) return;
  lastSpawnTick = currentTick;

  const lengthSeed = getSpawnSeedForTick(currentTick);
  const sharedLength = pickLengthFromSeed(lengthSeed, multiRoundScore);
  multiCurrentLength = sharedLength;

  const speedSeed = getSpawnSeedForTick(currentTick + 99999);
  const esc = getEscalation(multiRoundScore);
  // BUG1 FIX: compute base speed at full pane height — panes scale it themselves
  const sharedBaseSpeed = (MULTI_CFG.baseSpeed + seededRand(speedSeed) * MULTI_CFG.rand) * esc.mult;

  // BUG3 FIX: pick col from 0-3 so all 4 main-pane columns are reachable.
  // Mini panes (3 cols) use col % pCols.length which wraps naturally.
  const colSeed = getSpawnSeedForTick(currentTick + 55555);
  const sharedCol = Math.floor(seededRand(colSeed) * 4); // 0-3

  alive.forEach(p => {
    if(p.falling) return;
    const activeSet = new Set(p.rows.map(r=>r.text));
    const wordText = getMultiWordForPlayer(sharedLength, activeSet);
    // BUG1 FIX: store baseSpeed; drawPane scales it by pane height ratio when needed
    p.falling = { text: wordText, col: sharedCol, y: 0, baseSpeed: sharedBaseSpeed, speed: sharedBaseSpeed };
    p.spawnTimer = 0;
  });
}

function pickLengthFromSeed(seed, avgScore){
  const r = seededRand(seed);
  let options;
  if(avgScore < 30)        options = [3,3,3,4,4];
  else if(avgScore < 70)   options = [3,4,4,4,5];
  else if(avgScore < 130)  options = [4,4,5,5,6];
  else if(avgScore < 210)  options = [5,6,6,7,8];
  else if(avgScore < 320)  options = [6,7,8,9,10];
  else                     options = [8,9,10,11,12,13];
  const valid = options.filter(l => WORDS_BY_LENGTH[l]);
  if(!valid.length) return AVAILABLE_LENGTHS[Math.floor(r * AVAILABLE_LENGTHS.length)];
  return valid[Math.floor(r * valid.length)];
}

function getMultiWordForPlayer(targetLength, activeSet){
  const candidates = WORDS_BY_LENGTH[targetLength] || [];
  const available = candidates.filter(({w}) => !activeSet.has(w));
  const pool = available.length > 0 ? available : candidates;
  if(pool.length === 0){
    const fallback = WORDS_MULTI.filter(({w}) => !activeSet.has(w) && Math.abs(w.length - targetLength) <= 2);
    const fb = fallback.length > 0 ? fallback : WORDS_MULTI;
    return fb[Math.floor(Math.random() * fb.length)].w;
  }
  return pool[Math.floor(Math.random() * pool.length)].w;
}

function getMultiPts(word, combo, danger){
  const base = Math.max(5, word.length * 3);
  return Math.round(base * (1 + combo * 0.1) * (1 + danger * 0.2));
}

const MULTI_CFG = { baseSpeed:1.6, rand:0.5, spawnBase:130 };

function getEscalation(sc){
  if(sc >= 300) return { mult:2.8, danger:4, label:"INSANE!" };
  if(sc >= 200) return { mult:2.2, danger:3, label:"DANGER!" };
  if(sc >= 120) return { mult:1.7, danger:2, label:"FASTER!" };
  if(sc >=  60) return { mult:1.35,danger:1, label:"SPEEDING UP" };
  return              { mult:1.0,  danger:0, label:"" };
}

  ctx.font = `${size}px ${PX}`;
  if(glow){ ctx.shadowColor=color; ctx.shadowBlur=size*1.4; }
  ctx.fillStyle = color; ctx.fillText(text, x, y);

  ctx.font = `${size}px ${PX}`;

function hexRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function pixelBox(b, color=C.teal){
  ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.fillRect(b.x+4,b.y+4,b.w,b.h);
  ctx.fillStyle="rgba(5,5,25,0.9)"; ctx.fillRect(b.x,b.y,b.w,b.h);
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.strokeRect(b.x,b.y,b.w,b.h);
  ctx.strokeStyle=`rgba(${hexRgb(color)},0.2)`; ctx.lineWidth=1; ctx.strokeRect(b.x+4,b.y+4,b.w-8,b.h-8);
  const s=6; ctx.fillStyle=color;
  ctx.fillRect(b.x,b.y,s,2);ctx.fillRect(b.x,b.y,2,s);
  ctx.fillRect(b.x+b.w-s,b.y,s,2);ctx.fillRect(b.x+b.w-2,b.y,2,s);
  ctx.fillRect(b.x,b.y+b.h-2,s,2);ctx.fillRect(b.x,b.y+b.h-s,2,s);
  ctx.fillRect(b.x+b.w-s,b.y+b.h-2,s,2);ctx.fillRect(b.x+b.w-2,b.y+b.h-s,2,s);
  ctx.font=`13px ${PX}`;
  const tw=ctx.measureText(b.text).width;
  pxDraw(b.text, b.x+(b.w-tw)/2, b.y+b.h/2+6, color, 13, false);
}

    for(let i=0;i<THEMES.length;i++){

      const tx=110+col*130, ty=375+row*68;
      if(mx>tx&&mx<tx+110&&my>ty&&my<ty+52){
        applyTheme(i); sfxClick(); return;
      }
    }
    if(mx>180&&mx<420&&my>580&&my<635){ sfxBack(); state="menu"; }
  } else if(state==="gameover"){
    if(mx>80&&mx<300&&my>500&&my<548){
      sfxFanfare(); setTimeout(()=>startGame(difficulty,1),200);
    }
    if(mx>310&&mx<530&&my>500&&my<548){
      sfxTransition(); state="menu"; paused=false; resetAll(); startBGM("menu");
    }
  }

  if(state==="game" && playerCount > 1){
    if(playerCount === 2){
      const paneW = W / 2;
      if(mx < paneW) activeTypingPlayer = 0;
      else activeTypingPlayer = 1;
    } else {
      // 4P POV layout click handling
      const DIVX = Math.round(W * 0.62);
      if(mx >= DIVX){
        // BUG6 FIX: clamp slot to max 2 to prevent out-of-bounds access
        const sph = Math.floor(H / 3);
        const slot = Math.min(2, Math.floor(my / sph));
        const focus = activeTypingPlayer;
        const opponents = [0,1,2,3].filter(i => i !== focus);
        const target = opponents[slot];
        if(target !== undefined) activeTypingPlayer = target;
      }
      // Clicking the main pane does not change activeTypingPlayer
    }
  }
});

function hit(b,x,y){ return x>b.x&&x<b.x+b.w&&y>b.y&&y<b.y+b.h; }

// ── REAL MULTIPLAYER via PeerJS ───────────────────────────────────────────────
let myPeer = null;
let hostConn = null;
let guestConns = [];
let myPlayerId = Math.random().toString(36).slice(2,8).toUpperCase();
let lobbyPeers = {};

function generateCode(){ return Math.random().toString(36).substring(2,7).toUpperCase(); }

async function hostGame(){
  lobby.code = generateCode();
  lobby.players = 1;
  lobby.role = "host";
  lobby.diff = "medium";
  lobbyPeers = {};
  myReady = false;
  lobbyReadyCount = 0;
  countdownActive = false; countdownValue = 3;
  state = "lobby_wait";

  if(myPeer){ myPeer.destroy(); }
  myPeer = new Peer("wArena-"+lobby.code);
  myPeer.on("open", ()=>{
    myPeer.on("connection", (conn)=>{
      conn.on("open", ()=>{
        guestConns.push(conn);
        conn.on("data", (data)=>{
          if(data.type==="gamestate") onGameMsg(data);
          else onLobbyMsg(data, conn);
        });
        conn.send({ type:"welcome", from:myPlayerId, name:username||"HOST",
                    diff: lobby.diff,
                    hostReady: myReady,
                    hostPeerId: myPlayerId,
                    peers: Object.entries(lobbyPeers).map(([id,p])=>({id,name:p.name,ready:p.ready||false})) });
      });
      conn.on("close", ()=>{
        guestConns = guestConns.filter(c=>c!==conn);
        if(conn._peerId) delete lobbyPeers[conn._peerId];
        lobby.players = Object.keys(lobbyPeers).length + 1;
        lobbyReadyCount = Object.values(lobbyPeers).filter(p=>p.ready).length + (myReady?1:0);
        broadcastLobby({ type:"joined", from:"__disconnect__", name:"", total:lobby.players,
          diff:lobby.diff, hostPeerId:myPlayerId,
          peers:Object.entries(lobbyPeers).map(([id,p])=>({id,name:p.name,ready:p.ready})) });
        if(countdownActive){ countdownActive=false; if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; } sfxMiss(); }
      });
    });
  });
  myPeer.on("error", (e)=> console.warn("PeerJS host error:", e));
}

let joinInput="", joinErrorMsg="", joinConnecting=false;

function joinGame(){ joinInput=""; joinErrorMsg=""; joinConnecting=false; state="joingame"; }

async function submitJoinCode(){
  const val = joinInput.toUpperCase().trim();
  if(val.length < 3){ joinErrorMsg="ENTER A CODE!"; sfxMiss(); return; }
  joinConnecting = true;
  joinErrorMsg = "";
  lobby.code = val;
  lobby.role = "join";
  lobbyPeers = {};
  myReady = false;
  lobbyReadyCount = 0;
  countdownActive = false; countdownValue = 3;

  if(myPeer){ myPeer.destroy(); }
  myPeer = new Peer();
  myPeer.on("open", ()=>{
    hostConn = myPeer.connect("wArena-"+val, { reliable:true });
    hostConn.on("open", ()=>{
      joinConnecting = false;
      joinErrorMsg = "";
      state = "lobby_wait";
      hostConn.send({ type:"join", from:myPlayerId, name:username||"P2" });
      hostConn.on("data", (data)=>{
        if(data.type==="gamestate") onGameMsg(data);
        else onLobbyMsg(data, hostConn);
      });
    });
    hostConn.on("error", ()=>{ joinConnecting=false; joinErrorMsg="CANNOT CONNECT!"; sfxMiss(); });
    hostConn.on("close", ()=>{ joinConnecting=false; joinErrorMsg="HOST DISCONNECTED"; });
  });
  myPeer.on("error", (e)=>{
    joinConnecting=false; joinErrorMsg = "CANNOT CONNECT!"; sfxMiss();
    console.warn("PeerJS join error:", e);
  });

  setTimeout(()=>{ if(joinConnecting){ joinConnecting=false; joinErrorMsg="TIMEOUT - CHECK CODE"; sfxMiss(); } }, 8000);
}

function onLobbyMsg(data, fromConn){
  const { type, from, name, peers } = data;

  if(type==="welcome"){
    if(peers) peers.forEach(p=>{ if(p.id!==myPlayerId) lobbyPeers[p.id]={name:p.name,ready:p.ready||false}; });
    lobby.hostName = name||"HOST";
    lobby.hostReady = data.hostReady||false;
    lobby.hostPeerId = data.hostPeerId || from;
    lobby.players = Object.keys(lobbyPeers).length + 2;
    lobby.diff = data.diff || "medium";
    lobbyReadyCount = Object.values(lobbyPeers).filter(p=>p.ready).length
                    + (myReady?1:0)
                    + (lobby.hostReady?1:0);
    sfxPlayerJoin();

  } else if(type==="join"){
    if(!lobbyPeers[from]) sfxPlayerJoin();
    lobbyPeers[from] = { name:name||from, ready:false };
    if(fromConn) fromConn._peerId = from;
    lobby.players = Object.keys(lobbyPeers).length + 1;
    broadcastLobby({ type:"joined", from, name, total:lobby.players, diff:lobby.diff,
      hostPeerId: myPlayerId,
      peers: Object.entries(lobbyPeers).map(([id,p])=>({id,name:p.name,ready:p.ready})) });

  } else if(type==="joined"){
    const isDisconnect = (from === "__disconnect__");
    if(data.peers){
      Object.keys(lobbyPeers).forEach(id => {
        if(!data.peers.find(p=>p.id===id) && id!==myPlayerId) delete lobbyPeers[id];
      });
      data.peers.forEach(p=>{
        if(p.id!==myPlayerId) lobbyPeers[p.id]={name:p.name,ready:p.ready||false};
      });
    } else if(!isDisconnect && !lobbyPeers[from]){
      lobbyPeers[from] = { name:name||from, ready:false };
    }
    if(data.hostPeerId) lobby.hostPeerId = data.hostPeerId;
    lobby.players = data.total || Object.keys(lobbyPeers).length + 1;
    lobby.diff = data.diff || lobby.diff;
    lobbyReadyCount = Object.values(lobbyPeers).filter(p=>p.ready).length
                    + (myReady?1:0)
                    + (lobby.role==="join" && lobby.hostReady ? 1 : 0);
    if(!isDisconnect) sfxPlayerJoin(); else sfxMiss();

  } else if(type==="ready"){
    if(lobbyPeers[from]) lobbyPeers[from].ready = data.isReady;
    lobby.players = Object.keys(lobbyPeers).length + 1;
    lobbyReadyCount = Object.values(lobbyPeers).filter(p=>p.ready).length + (myReady?1:0);
    if(data.isReady) sfxPlayerJoin(); else sfxBack();
    if(lobby.role==="host"){
      broadcastLobby({ type:"readystate", from, isReady:data.isReady,
        readyCount: lobbyReadyCount, total: lobby.players });
    }

  } else if(type==="readystate"){
    const who = data.from || from;
    const isFromHost = lobby.role==="join" && who === lobby.hostPeerId;
    if(isFromHost){
      lobby.hostReady = data.isReady;
    } else if(lobbyPeers[who]){
      lobbyPeers[who].ready = data.isReady;
    }
    if(data.total) lobby.players = data.total;
    lobbyReadyCount = data.readyCount;
    if(data.isReady) sfxPlayerJoin(); else sfxBack();

  } else if(type==="countdown"){
    countdownActive = true;
    countdownValue = data.value;
    countdownDiff = data.diff || lobby.diff;
    if(data.value > 0){ sfxCountdownBeep(); }
    else {
      sfxCountdownGo();
      startGame(countdownDiff, lobby.required);
    }

  } else if(type==="gameseed"){
    multiGameSeed = data.seed;
    multiGameStartMs = data.startMs;
    lastSpawnTick = -1;

  } else if(type==="start"){
    if(lobby.role==="join") startGame("multi", lobby.required);

  } else if(type==="rematchvote"){
    rematchVotes[from] = data.playAgain;
    if(lobby.role==="host"){
      broadcastLobby({ type:"rematchvote", from, playAgain:data.playAgain });
      checkRematchReady();
    }
    if(!data.playAgain && lobbyPeers[from]){
      delete lobbyPeers[from];
    }

  } else if(type==="rematchresult"){
    if(data.leaving) data.leaving.forEach(id=>{ delete lobbyPeers[id]; });
    returnToLobby();

  } else if(type==="leave"){
    delete lobbyPeers[from];
    lobby.players = lobby.role==="host"
      ? Object.keys(lobbyPeers).length + 1
      : Object.keys(lobbyPeers).length + 2;
    lobbyReadyCount = Object.values(lobbyPeers).filter(p=>p.ready).length
                    + (myReady?1:0)
                    + (lobby.role==="join" && lobby.hostReady ? 1 : 0);
    if(countdownActive){ countdownActive=false; countdownValue=3; sfxMiss(); }
  }
}

function broadcastLobby(data){
  guestConns.forEach(c=>{ try{ c.send(data); }catch(e){} });
}
function sendToHost(data){
  if(hostConn){ try{ hostConn.send(data); }catch(e){} }
}
function sendLobby(data){
  if(lobby.role==="host") broadcastLobby(data);
  else sendToHost(data);
}

// ── REMATCH TRACKING ─────────────────────────────────────────────────────────
let rematchVotes = {};
let rematchTimeout = null;
let myRematchVote = null;
const REMATCH_TIMEOUT_MS = 15000;

function initRematch(){
  rematchVotes = {};
  myRematchVote = null;
  if(rematchTimeout) clearTimeout(rematchTimeout);
  rematchTimeout = setTimeout(()=>{
    if(state !== "gameover_multi" || myRematchVote !== null) return;
    castRematchVote(false);
  }, REMATCH_TIMEOUT_MS);
}

function castRematchVote(playAgain){
  if(myRematchVote !== null) return;
  myRematchVote = playAgain;
  if(rematchTimeout){ clearTimeout(rematchTimeout); rematchTimeout=null; }
  const msg = { type:"rematchvote", from:myPlayerId, playAgain };
  if(lobby.role==="host") broadcastLobby(msg);
  else sendToHost(msg);
  rematchVotes[myPlayerId] = playAgain;
  if(!playAgain){
    leaveLobbyChannel();
    state="menu"; resetAll(); startBGM("menu");
    return;
  }
  if(lobby.role==="host") checkRematchReady();
}

function checkRematchReady(){
  if(lobby.role !== "host") return;
  const connectedIds = Object.keys(lobbyPeers);
  const allVoted = connectedIds.every(id => rematchVotes[id] !== undefined);
  if(!allVoted) return;
  const leaving = connectedIds.filter(id => rematchVotes[id] === false);
  leaving.forEach(id => delete lobbyPeers[id]);
  broadcastLobby({ type:"rematchresult", leaving });
  returnToLobby();
}

function returnToLobby(){
  myReady = false;
  lobbyReadyCount = 0;
  countdownActive = false; countdownValue = 3;
  if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; }
  Object.keys(lobbyPeers).forEach(id=>{ if(lobbyPeers[id]) lobbyPeers[id].ready=false; });
  if(lobby.role==="join") lobby.hostReady = false;
  lobby.players = Object.keys(lobbyPeers).length + 1;
  state = "lobby_wait";
  startBGM("menu");
}

let countdownInterval = null;

function startCountdown(){
  countdownActive = true;
  countdownValue = 3;
  countdownDiff = "multi";
  sfxCountdownBeep();
  broadcastLobby({ type:"countdown", value:3, diff:"multi" });
  countdownInterval = setInterval(()=>{
    countdownValue--;
    if(countdownValue > 0){
      sfxCountdownBeep();
      broadcastLobby({ type:"countdown", value:countdownValue, diff:"multi" });
    } else {
      clearInterval(countdownInterval); countdownInterval = null;
      sfxCountdownGo();
      broadcastLobby({ type:"countdown", value:0, diff:"multi" });
      setTimeout(()=>startGame("multi", lobby.required), 200);
    }
  }, 1000);
}

function leaveLobbyChannel(){
  sendLobby({ type:"leave", from:myPlayerId });
  if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; }
  countdownActive=false; countdownValue=3;
  myReady=false; lobbyReadyCount=0;
  if(hostConn){ try{ hostConn.close(); }catch(e){} hostConn=null; }
  guestConns.forEach(c=>{ try{ c.close(); }catch(e){} }); guestConns=[];
  if(myPeer){ try{ myPeer.destroy(); }catch(e){} myPeer=null; }
  lobbyPeers={};
}

function isOnlineConnected(){
  return myPeer && myPeer.open;
}

// ── ONLINE GAME STATE SYNC ───────────────────────────────────────────────────
let isOnlineGame = false;
let localPlayerIdx = 0;
let gameSessionId = 0;

function sendGameState(){
  if(!isOnlineGame) return;
  const now = Date.now();
  if(now - lastSendTime < SEND_INTERVAL_MS) return;
  lastSendTime = now;
  const me = players[localPlayerIdx];
  if(!me) return;
  const rowsChanged = me.rows.length !== lastSentRowCount;
  if(rowsChanged) lastSentRowCount = me.rows.length;
  const currentFallingText = me.falling ? me.falling.text : null;
  const fallingChanged = currentFallingText !== lastSentFallingText;
  if(fallingChanged) lastSentFallingText = currentFallingText;
  const data = { type: "gamestate", score: me.score, combo: me.combo, dead: me.dead };
  if(rowsChanged) data.rows = me.rows;
  if(fallingChanged){
    if(me.falling){
      data.falling = { text: me.falling.text, col: me.falling.col, speed: me.falling.speed, y: me.falling.y };
    } else {
      data.falling = null;
    }
    data.fallingChanged = true;
  }
  if(hostConn){ try{ hostConn.send(data); }catch(e){} }
  guestConns.forEach(c=>{ try{ c.send(data); }catch(e){} });
}

function onGameMsg(data){
  if(data.type !== "gamestate") return;
  const oppIdx = localPlayerIdx === 0 ? 1 : 0;
  const opp = players[oppIdx];
  if(!opp) return;
  opp.score = data.score;
  opp.combo = data.combo;
  opp.dead  = data.dead;
  if(data.rows !== undefined) opp.rows = data.rows;
  if(data.fallingChanged){
    if(data.falling){
      opp.falling = { text: data.falling.text, col: data.falling.col, y: data.falling.y, speed: data.falling.speed || 2.5 };
    } else {
      opp.falling = null;
    }
  }
  if(opp.dead && !players[localPlayerIdx].dead){
    const sessionAtCall = gameSessionId;
    setTimeout(()=>{
      if(gameSessionId === sessionAtCall && state === "game") state="gameover_multi";
    }, 1000);
  }
}

// ── ACCURACY + TIMING STATE ───────────────────────────────────────────────────
let singleTotalKeys=0, singleCorrectWords=0, singleWrongSubmits=0;
let singleNextWord=null;
let singleGameStartTime=0, singlePausedMs=0, singlePauseStartTime=0;

function pickNextWord(){
  const pool=WORDS[difficulty]||WORDS.easy;
  const col=Math.floor(Math.random()*COLS.length);
  const active=new Set();
  if(singleFalling) active.add(singleFalling.text);
  singleRows.forEach(r=>active.add(r.text));
  const available=pool.filter(w=>!active.has(w));
  const src=available.length>0?available:pool;
  return { text:src[Math.floor(Math.random()*src.length)], col, x:COLS[col] };
}

// ── START GAME ───────────────────────────────────────────────────────────────
function startGame(diff, numPlayers){
  state = "game"; difficulty = diff; playerCount = numPlayers || 1;
  paused = false;
  isOnlineGame = (numPlayers === 2 && isOnlineConnected());
  localPlayerIdx = (isOnlineGame && lobby.role === "join") ? 1 : 0;
  myReady = false; lobbyReadyCount = 0;
  countdownActive = false; countdownValue = 3;
  if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; }
  if(numPlayers > 1){
    multiGameSeed = Math.floor(Date.now() % 999983);
    multiGameStartMs = Date.now();
    lastSpawnTick = -1;
    if(lobby.role==="host"){
      broadcastLobby({ type:"gameseed", seed:multiGameSeed, startMs:multiGameStartMs });
    }
  }
  resetAll();
  if(isOnlineGame && players.length >= 2){
    const peers = Object.entries(lobbyPeers).filter(([id])=>id!==myPlayerId);
    const oppIdx = localPlayerIdx === 0 ? 1 : 0;
    if(peers.length > 0) players[oppIdx].name = peers[0][1].name || "P2";
    players[localPlayerIdx].name = username ? username.toUpperCase() : "P1";
  }
  startBGM("game");
}

function resetAll(){
  gameSessionId++;
  singleRows=[]; singleFalling=null; singleTyped=""; singleScore=0; singleCombo=0;
  singleLastEscDanger=-1; singleEscFlashTimer=0; singleSpawnTimer=0; singleParticles=[];
  singleTotalKeys=0; singleCorrectWords=0; singleWrongSubmits=0;
  singleGameStartTime=Date.now(); singlePausedMs=0; singlePauseStartTime=0;
  singleNextWord = difficulty ? pickNextWord() : null;
  players = [];
  for(let i=0; i<playerCount; i++){
    const pname = (i===0 && username) ? username.toUpperCase() : PLAYER_NAMES[i];
    players.push(makePlayerState(i, PLAYER_COLORS[i], pname, null));
  }
  activeTypingPlayer = 0;
  lastStanding = null;
  // BUG5 FIX: use timestamp instead of frame counter for last-standing timer
  lastStandingDeadline = 0;
  multiForfeitConfirm = false;
  rematchVotes = {}; myRematchVote = null;
  if(rematchTimeout){ clearTimeout(rematchTimeout); rematchTimeout=null; }
  multiSpawnTimer = 0;
  multiCurrentLength = 3;
  multiSpawnInterval = 130;
  multiRoundScore = 0;
  lastSpawnTick = -1;
  lastSendTime = 0;
  lastSentRowCount = -1;
  lastSentFallingText = null;
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
function spawnParticles(arr, x, y, color, count=8){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2, spd=1.5+Math.random()*3;
    arr.push({ x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:1,color,size:2+Math.random()*3 });
  }
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener("keydown",(e)=>{
  if(state==="splash" && splashPhase==="press"){
    if(!audioReady){ initAudio(); }
    audioCtx.resume().then(()=>{ sfxCoin(); });
    splashPhase="name"; return;
  }
  if(state==="splash" && splashPhase==="name"){
    if(!audioReady){ initAudio(); audioCtx.resume(); }
    if(e.key==="Backspace"){ usernameInput=usernameInput.slice(0,-1); usernameErr=""; sfxType(); return; }
    if(e.key==="Enter"){ confirmUsername(); return; }
    if(e.key==="Escape"){ splashPhase="press"; usernameInput=""; usernameErr=""; return; }
    if(/^[a-zA-Z0-9 _-]$/.test(e.key) && usernameInput.length<12){ usernameInput+=e.key; usernameErr=""; sfxType(); }
    return;
  }
  if(!audioReady){ initAudio(); audioCtx.resume().then(()=>{ startBGM("menu"); }); }
  else if(audioCtx && audioCtx.state === "suspended"){ audioCtx.resume(); }

  if(state==="lobby_wait" && e.key===" " && !countdownActive){
    e.preventDefault();
    myReady = !myReady;
    const guestReady = Object.values(lobbyPeers).filter(p=>p.ready).length;
    const hostReadyVal = lobby.role==="join" ? (lobby.hostReady?1:0) : 0;
    lobbyReadyCount = guestReady + (myReady?1:0) + hostReadyVal;
    if(lobby.role==="host"){
      broadcastLobby({ type:"readystate", from:myPlayerId, isReady:myReady,
        readyCount:lobbyReadyCount, total:lobby.players });
    } else {
      sendToHost({ type:"ready", from:myPlayerId, isReady:myReady });
    }
    if(myReady){ sfxLobbyReady(); } else { sfxBack(); }
    return;
  }
  if(state==="lobby_wait" && e.key==="Enter" && lobby.role==="host" && !countdownActive){
    const canStart = lobby.players >= lobby.required && lobbyReadyCount >= lobby.players;
    if(canStart){ sfxFanfare(); startCountdown(); }
    else { sfxMiss(); }
    return;
  }

  if(state==="howtoplay"){
    if(e.key==="Escape"||e.key==="Backspace"){ sfxBack(); state="menu"; howToPlayPage=0; return; }
    if(e.key==="ArrowRight"||e.key==="d"||e.key==="D"){ if(howToPlayPage<HTP_PAGES-1){ howToPlayPage++; sfxClick(); } return; }
    if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A"){ if(howToPlayPage>0){ howToPlayPage--; sfxClick(); } return; }
    return;
  }

  if(state==="joingame"){
    if(e.key==="Backspace"){ joinInput=joinInput.slice(0,-1); joinErrorMsg=""; return; }
    if(e.key==="Enter"){ submitJoinCode(); return; }
    if(e.key==="Escape"){ state="hostjoin"; joinConnecting=false; return; }
    if(/^[a-zA-Z0-9]$/.test(e.key)&&joinInput.length<8){ joinInput+=e.key.toUpperCase(); joinErrorMsg=""; }
    return;
  }

  if(state!=="game") return;

  if(e.key === "Tab" && playerCount > 1){
    e.preventDefault();
    activeTypingPlayer = (activeTypingPlayer + 1) % playerCount;
    sfxClick(); return;
  }

  if(playerCount === 1){
    if(e.key==="Escape"){
      paused = !paused;
      if(paused){
        singlePauseStartTime=Date.now();
        bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.15);
      } else {
        singlePausedMs+=Date.now()-singlePauseStartTime;
        bgmGain.gain.linearRampToValueAtTime(soundEnabled?0.18:0, audioCtx.currentTime+0.15);
      }
      sfxClick(); return;
    }
    if(paused) return;
    if(e.key==="Backspace") singleTyped=singleTyped.slice(0,-1);
    else if(e.key==="Enter") singleSubmit();
    else if(/^[a-zA-Z]$/.test(e.key)){ singleTyped+=e.key.toUpperCase(); singleTotalKeys++; sfxType(); }
  } else {
    if(e.key==="Escape"){
      multiForfeitConfirm = !multiForfeitConfirm;
      if(multiForfeitConfirm){
        bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.15);
      } else {
        bgmGain.gain.linearRampToValueAtTime(soundEnabled?0.18:0, audioCtx.currentTime+0.15);
      }
      sfxClick(); return;
    }
    if(multiForfeitConfirm) return;
    const p = players[activeTypingPlayer];
    if(!p || p.dead) return;
    if(e.key==="Backspace") p.typed=p.typed.slice(0,-1);
    else if(e.key==="Enter") multiSubmit(p);
    else if(/^[a-zA-Z]$/.test(e.key)){ p.typed+=e.key.toUpperCase(); sfxType(); }
  }
});

function singleSubmit(){
  const val = singleTyped.toUpperCase();
  if(singleFalling && val===singleFalling.text){
    const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy;
    const esc=getEscalation(singleScore);

// ── SINGLE PLAYER GAME ────────────────────────────────────────────────────────
function game(){
  const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy;
  const esc=getEscalation(singleScore);

  if(esc.danger > singleLastEscDanger){
    singleLastEscDanger=esc.danger; singleEscFlashTimer=90; singleEscFlashLabel=esc.label;
    if(audioReady){ bgmGain.gain.setValueAtTime(soundEnabled?0.28:0,audioCtx.currentTime); bgmGain.gain.linearRampToValueAtTime(soundEnabled?0.18:0,audioCtx.currentTime+0.6); }
    sfxCombo();
  }

  if(esc.danger>=3){ const p=0.04+0.04*Math.sin(Date.now()*0.008); ctx.fillStyle=`rgba(255,20,50,${p})`; ctx.fillRect(0,0,W,H); }
  else if(esc.danger===2){ const p=0.02+0.02*Math.sin(Date.now()*0.005); ctx.fillStyle=`rgba(255,120,0,${p})`; ctx.fillRect(0,0,W,H); }

  const dynInterval=Math.max(30, cfg.spawnBase - singleScore * 0.3);
  if(!paused){
    singleSpawnTimer++;
    if(!singleFalling && singleSpawnTimer>=dynInterval){
      const speed=(cfg.baseSpeed+Math.random()*cfg.rand)*esc.mult;
      const nw=singleNextWord||pickNextWord();
      singleFalling={text:nw.text, col:nw.col, x:COLS[nw.col], y:0, speed};
      singleNextWord=pickNextWord();
      singleSpawnTimer=0;
    }
  }

  for(let i=0;i<singleRows.length;i++){
    const r=singleRows[i],wx=COLS[r.col],wy=BOTTOM-i*ROW_H;
    ctx.font=`13px ${PX}`; const tw=ctx.measureText(r.text).width;
    const dangerRatio=singleRows.length/14;
    const rowClr=dangerRatio>0.7?C.red:dangerRatio>0.4?C.amber:C.green;
    ctx.fillStyle=`rgba(0,180,120,${0.05+dangerRatio*0.1})`; ctx.fillRect(wx-8,wy-22,tw+16,28);
    ctx.strokeStyle=`rgba(${dangerRatio>0.7?"255,60,80":dangerRatio>0.4?"255,180,0":"0,230,150"},0.4)`;
    ctx.lineWidth=1; ctx.strokeRect(wx-8,wy-22,tw+16,28);
    pxDraw(r.text,wx,wy,rowClr,13,true);
  }

  if(singleFalling && !paused){
    singleFalling.y+=singleFalling.speed;
    const limit=BOTTOM-singleRows.length*ROW_H;
    if(singleFalling.y>=limit){
      singleRows.push({text:singleFalling.text,col:singleFalling.col}); sfxLand();
      spawnParticles(singleParticles,singleFalling.x+40,limit,C.amber,6);
      singleFalling=null; singleSpawnTimer=0;
      if(singleRows.length>14) state="gameover";
    }
  }

  if(singleFalling){

function drawPane(p, px, py, pw, ph, pCols, pRowH, isActive, isRemote=false) {
  const pBottom = py + ph - 44;
  const pTop    = py + 36;

  ctx.save();
  ctx.beginPath(); ctx.rect(px, py, pw, ph); ctx.clip();

  const isMulti = playerCount > 1;
  const cfg = isMulti ? MULTI_CFG : (DIFF_CFG[difficulty]||DIFF_CFG.easy);
  const esc = getEscalation(p.score);

  if(esc.danger > p.lastEscDanger){
    p.lastEscDanger = esc.danger; p.escFlashTimer = 90; p.escFlashLabel = esc.label; sfxCombo();
  }
  if(esc.danger>=3){ const pulse=0.04+0.04*Math.sin(Date.now()*0.008); ctx.fillStyle=`rgba(255,20,50,${pulse})`; ctx.fillRect(px,py,pw,ph); }
  else if(esc.danger===2){ const pulse=0.02+0.02*Math.sin(Date.now()*0.005); ctx.fillStyle=`rgba(255,120,0,${pulse})`; ctx.fillRect(px,py,pw,ph); }

  const PLAY_H = ph - 36 - 44;

  if(!isRemote){
    if(isMulti){
      if(p.falling){
        // BUG1 FIX: scale speed proportionally to this pane's height vs full canvas height
        const speedScale = ph / H;
        p.falling.speed = (p.falling.baseSpeed || p.falling.speed) * speedScale;
        p.falling.y += p.falling.speed;
        const limitRel = PLAY_H - p.rows.length * pRowH;
        if(p.falling.y >= limitRel){
          p.rows.push({text:p.falling.text, col:p.falling.col}); sfxLand();
          spawnParticles(p.particles, px + pCols[p.falling.col % pCols.length] + 20, pTop + limitRel, C.amber, 5);
          p.falling = null; p.spawnTimer = 0;
          if(p.rows.length > 12) p.dead = true;
        }
      }
    } else {
      p.spawnTimer++;
      if(!p.falling && p.spawnTimer >= (Math.max(30, cfg.spawnBase - p.score * 0.3))){
        const esc2 = getEscalation(p.score);
        const speed = (cfg.baseSpeed + Math.random()*cfg.rand) * esc2.mult;
        const col = Math.floor(Math.random() * pCols.length);
        const pool2 = WORDS[difficulty]||WORDS.easy;
        const activeSet = new Set(p.rows.map(r=>r.text));
        if(p.falling) activeSet.add(p.falling.text);
        const avail2 = pool2.filter(w=>!activeSet.has(w));
        const src2 = avail2.length>0?avail2:pool2;
        p.falling = { text: src2[Math.floor(Math.random()*src2.length)], col, y: 0, speed };
        p.spawnTimer = 0;
      }
      if(p.falling){
        p.falling.y += p.falling.speed;
        const limitRel = PLAY_H - p.rows.length * pRowH;
        if(p.falling.y >= limitRel){
          p.rows.push({text:p.falling.text, col:p.falling.col}); sfxLand();
          spawnParticles(p.particles, px + pCols[p.falling.col % pCols.length] + 20, pTop + limitRel, C.amber, 5);
          p.falling = null; p.spawnTimer = 0;
          if(p.rows.length > 12) p.dead = true;
        }
      }
    }
  } else {
    if(p.falling){
      const speedScale = ph / H;
      p.falling.speed = (p.falling.baseSpeed || p.falling.speed) * speedScale;
      p.falling.y += p.falling.speed;
      const limitRel = PLAY_H - p.rows.length * pRowH;
      if(p.falling.y >= limitRel) p.falling = null;
    }
  }

  for(let i=0;i<p.rows.length;i++){
    const r=p.rows[i];
    const wx = px + pCols[r.col % pCols.length];
    const wy = pBottom - i * pRowH;
    ctx.font=`10px ${PX}`; const tw=ctx.measureText(r.text).width;

    const rowClr=dangerRatio>0.7?C.red:dangerRatio>0.4?C.amber:C.green;

    ctx.strokeStyle=`rgba(${dangerRatio>0.7?"255,60,80":dangerRatio>0.4?"255,180,0":"0,230,150"},0.4)`;
    ctx.lineWidth=1; ctx.strokeRect(wx-5,wy-16,tw+10,20);

    ctx.font=`11px ${PX}`; const tw=ctx.measureText(p.falling.text).width;

  for(let i=p.particles.length-1;i>=0;i--){
    const pt=p.particles[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.12; pt.life-=0.04;
    if(pt.life<=0){ p.particles.splice(i,1); continue; }
    ctx.globalAlpha=pt.life; ctx.fillStyle=pt.color; ctx.fillRect(pt.x,pt.y,pt.size,pt.size);
  }
  ctx.globalAlpha=1;

  ctx.fillStyle="rgba(3,3,18,0.94)"; ctx.fillRect(px, py, pw, 36);
  ctx.fillStyle=isActive ? p.color : `rgba(${hexRgb(p.color)},0.4)`;
  ctx.fillRect(px, py+34, pw, 2);

  ctx.font=`7px ${PX}`;
  const nw=ctx.measureText(p.name).width;
  if(isActive){ ctx.shadowColor=p.color; ctx.shadowBlur=8; }
  ctx.fillStyle=isActive?p.color:`rgba(${hexRgb(p.color)},0.6)`;
  ctx.fillText(p.name, px + pw/2 - nw/2, py + 13);
  ctx.shadowBlur=0;

  ctx.font=`9px ${PX}`;
  pxDraw(`${p.score}`, px+6, py+28, C.amber, 9, false);

  if(p.combo > 1){
    ctx.font=`7px ${PX}`;
    const cs=`x${p.combo}`;
    const cw=ctx.measureText(cs).width;
    pxDraw(cs, px+pw-cw-6, py+28, p.combo>=5?C.amber:C.green, 7, false);
  }

  if(isActive){
    const t=Date.now()*0.006;
    const alpha=0.5+0.5*Math.sin(t);
    ctx.strokeStyle=`rgba(${hexRgb(p.color)},${alpha.toFixed(2)})`;
    ctx.lineWidth=2; ctx.strokeRect(px+1,py+1,pw-2,ph-2);
  }

  ctx.fillStyle="rgba(3,3,18,0.95)"; ctx.fillRect(px, py+ph-44, pw, 44);
  ctx.fillStyle=isActive ? p.color : `rgba(${hexRgb(p.color)},0.3)`;
  ctx.fillRect(px, py+ph-44, pw, 2);

  if(isActive && !isRemote){
    ctx.font=`8px ${PX}`;
    pxDraw(">",px+6,py+ph-16,"#2a4a6a",8,false);
    const cursor=Math.floor(Date.now()/400)%2===0?"_":" ";
    const display=p.typed+cursor;
    ctx.font=`9px ${PX}`;
    pxDraw(display,px+20,py+ph-16,p.color,9,true);
  } else if(isRemote){
    ctx.font=`7px ${PX}`;
    const lbl="● LIVE";
    const lw2=ctx.measureText(lbl).width;
    ctx.shadowColor=C.green; ctx.shadowBlur=Math.floor(Date.now()/400)%2===0?6:0;
    ctx.fillStyle=C.green; ctx.fillText(lbl, px+pw/2-lw2/2, py+ph-14);
    ctx.shadowBlur=0;
  } else {
    ctx.font=`7px ${PX}`;
    const hint="TAB to switch";
    const hw=ctx.measureText(hint).width;
    ctx.fillStyle="rgba(40,50,80,0.8)";
    ctx.fillText(hint, px+pw/2-hw/2, py+ph-14);
  }

  if(p.dead){
    ctx.fillStyle="rgba(0,0,0,0.72)"; ctx.fillRect(px,py,pw,ph);
    ctx.font=`11px ${PX}`; const dw=ctx.measureText("GAME OVER").width;

  ctx.restore();

// ── SHARED MULTI SPAWN COORDINATOR ───────────────────────────────────────────
let multiSpawnTimer = 0;
let multiCurrentLength = 3;
let multiSpawnInterval = 130;
let multiRoundScore = 0;
let lastStanding = null;
// BUG5 FIX: timestamp-based deadline instead of frame counter
let lastStandingDeadline = 0;

// BUG4 FIX: only auto-switch if the local player's own lane died.
// In 4P local play, don't auto-switch — let the player press TAB.
function autoSwitchFromDead(){
  const ap = players[activeTypingPlayer];
  if(!ap || !ap.dead) return;

  if(isOnlineGame){
    // Online: only care about local player's lane
    if(players[localPlayerIdx] && players[localPlayerIdx].dead){
      const nextAlive = players.findIndex(p => !p.dead);
      if(nextAlive !== -1) activeTypingPlayer = nextAlive;
    }
  } else if(playerCount === 2){
    // 2P local: switch to the other player
    const nextAlive = players.findIndex((p,i) => !p.dead && i !== activeTypingPlayer);
    if(nextAlive !== -1) activeTypingPlayer = nextAlive;
  }
  // 4P local: do NOT auto-switch — player presses TAB to pick a new lane
}

function game2P(){
  autoSwitchFromDead();
  tickMultiSpawnCoordinator();
  const pw=W/2-1, ph=H;
  const pCols2=[14,70,126];

  ctx.fillStyle="#0a0a22"; ctx.fillRect(W/2-1,0,2,H);

  const meIdx = localPlayerIdx;
  const oppIdx = meIdx === 0 ? 1 : 0;
  drawPane(players[meIdx],  0,     0, pw, ph, pCols2, pRowH2, activeTypingPlayer===meIdx, false);
  drawPane(players[oppIdx], W/2+1, 0, pw, ph, pCols2, pRowH2, activeTypingPlayer===oppIdx, false);

  const t=Date.now()*0.003;

}

function game4P(){
  autoSwitchFromDead();
  tickMultiSpawnCoordinator();
  const DIVX  = Math.round(W * 0.62);
  const DIV_W = 2;
  const mpw   = DIVX - DIV_W;
  const mph   = H;

  const mainCols = [18, 90, 162, 234];
  const mainRowH = 40;
  const miniCols = [8, 44, 80];
  const miniRowH = 22;

  const focus = activeTypingPlayer;
  const opponents = [0,1,2,3].filter(i => i !== focus);

  ctx.fillStyle = "#0a0a22";

  const t = Date.now() * 0.003;

  ctx.fillStyle = `rgba(${hexRgb(players[focus].color)},${alpha.toFixed(2)})`;
  ctx.fillRect(DIVX, 0, DIV_W, H);

  for(let i = 1; i < 3; i++){
    const dy = i * sph;

    ctx.fillStyle = `rgba(80,80,180,0.35)`; ctx.fillRect(DIVX + DIV_W, dy - 1, spw, 2);
  }

  drawPane(players[focus], 0, 0, mpw, mph, mainCols, mainRowH, true, false);

    const sy = slot * sph;

  const focusP = players[focus];

  ctx.fillText(tabTxt, DIVX + DIV_W + spw/2 - tw2/2, H - 4);

  checkMultiGameOver();
  drawMultiForfeitOverlay();
}

function checkMultiGameOver(){
  if(state !== "game") return;
  const alive = players.filter(p=>!p.dead);
  if(alive.length === 0){
    lastStanding = null;
    state = "gameover_multi";
    stopBGM();
    if(playerCount > 1) initRematch();
    return;
  }
  if(alive.length === 1 && players.length > 1){
    if(!lastStanding || lastStanding !== alive[0]){
      lastStanding = alive[0];
      // BUG5 FIX: use real-time deadline instead of frame counter
      lastStandingDeadline = Date.now() + 2000;
    }
  }
  if(lastStanding && !lastStanding.dead){
    // BUG5 FIX: compare against wall-clock time
    if(lastStandingDeadline > 0 && Date.now() >= lastStandingDeadline){
      state = "gameover_multi";
      stopBGM();
      if(playerCount > 1) initRematch();
    }
  } else if(lastStanding && lastStanding.dead){
    lastStanding = null;
    lastStandingDeadline = 0;
  }
}

  ctx.fillStyle = "rgba(4,4,18,0.92)"; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.strokeRect(x, y, w, h);
  const s=5; ctx.fillStyle = color;
  ctx.fillRect(x,y,s,2);ctx.fillRect(x,y,2,s);ctx.fillRect(x+w-s,y,s,2);ctx.fillRect(x+w-2,y,2,s);
  ctx.fillRect(x,y+h-2,s,2);ctx.fillRect(x,y+h-s,2,s);ctx.fillRect(x+w-s,y+h-2,s,2);ctx.fillRect(x+w-2,y+h-s,2,s);
}
function htpLabel(text, x, y, color, size=8){
  ctx.font = `${size}px ${PX}`; ctx.shadowColor = color; ctx.shadowBlur = 6;
  ctx.fillStyle = color; ctx.fillText(text, x, y); ctx.shadowBlur = 0;
}

function loop(){
  bg();
  if(state==="splash")            drawSplash();
  else if(state==="menu")         menu();
  else if(state==="difficulty")   difficultyMenu();
  else if(state==="multiplayer")  multiMenu();
  else if(state==="hostjoin")     hostJoinMenu();
  else if(state==="joingame")     drawJoinGame();
  else if(state==="options")      drawOptions();
  else if(state==="howtoplay")    drawHowToPlay();
  else if(state==="lobby_wait")   lobbyWait();
  else if(state==="game"){
    if(playerCount === 1)       game();
    else if(playerCount === 2)  game2P();
    else if(playerCount === 4)  game4P();
  }
  else if(state==="gameover")       gameover();
  else if(state==="gameover_multi") gameover_multi();

  drawMusicIcon();

  if(state !== lastState && audioReady){
    if(["menu","difficulty","multiplayer","hostjoin","joingame","options","lobby_wait","howtoplay"].includes(state)) startBGM("menu");
    else if(state==="game") startBGM("game");
    lastState=state;
  }

  requestAnimationFrame(loop);
}

loop();
