<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Arena</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080818;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}
#cabinet {
  position: relative;
  background: linear-gradient(170deg, #181830 0%, #0d0d20 60%, #12122a 100%);
  border-radius: 20px 20px 14px 14px;
  padding: 20px 26px 24px;
  border: 2px solid #252550;
  box-shadow: 0 0 0 4px #09091c, 0 0 0 6px #1c1c40, 0 10px 50px rgba(0,0,0,0.9), inset 0 1px 0 rgba(80,80,180,0.12);
}
#screen-wrap {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 0 3px #04040e, 0 0 0 5px #18184a, 0 0 40px rgba(0,180,255,0.15), inset 0 0 80px rgba(0,0,0,0.6);
}
canvas { display: block; width: 600px; height: 700px; }
#scanlines {
  position: absolute; inset: 0; pointer-events: none; border-radius: 10px;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
}
#vignette {
  position: absolute; inset: 0; pointer-events: none; border-radius: 10px;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,15,0.55) 78%, rgba(0,0,8,0.9) 100%);
}
#cab-footer { text-align: center; font-family: 'Press Start 2P', monospace; font-size: 7px; color: #2a2a55; margin-top: 10px; letter-spacing: 3px; }
#cab-deco { display: flex; justify-content: center; align-items: center; gap: 18px; margin-top: 8px; }
.slot { width: 38px; height: 4px; background: #0a0a1e; border-radius: 2px; border: 1px solid #222244; }
.led { width: 7px; height: 7px; border-radius: 50%; animation: led 2s ease-in-out infinite alternate; }
.led.a { background:#00e5cc; box-shadow:0 0 7px #00e5cc; animation-delay:0s; }
.led.b { background:#4488ff; box-shadow:0 0 7px #4488ff; animation-delay:.7s; }
.led.c { background:#bb66ff; box-shadow:0 0 7px #bb66ff; animation-delay:1.3s; }
@keyframes led { from{opacity:.25} to{opacity:1} }
</style>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

// ── SEEDED PRNG ───────────────────────────────────────────────────────────────
function seededRand(seed){
  let t = seed + 0x6D2B79F5;
  t = Math.imul(t ^ t>>>15, t|1); t ^= t + Math.imul(t ^ t>>>7, t|61);
  return ((t ^ t>>>14)>>>0) / 4294967296;
}
function getEscalation(sc){
  if(sc>=300) return {mult:2.8,danger:4,label:"INSANE!"};
  if(sc>=200) return {mult:2.2,danger:3,label:"DANGER!"};
  if(sc>=120) return {mult:1.7,danger:2,label:"FASTER!"};
  if(sc>=60)  return {mult:1.35,danger:1,label:"SPEEDING UP"};
  return             {mult:1.0, danger:0,label:""};
}
function getMultiPts(word, combo, danger){
  return Math.round(Math.max(5,word.length*3)*(1+combo*0.1)*(1+danger*0.2));

function initAudio(){
  if(audioReady) return; audioReady=true;

  reverbDelay.connect(reverbGain); reverbGain.connect(masterGain);
  bgmDirect=audioCtx.createGain(); bgmDirect.gain.value=0.72;
  bgmGain.connect(bgmDirect); bgmDirect.connect(masterGain); bgmGain.connect(reverbDelay);
  masterGain.connect(audioCtx.destination);
  leadGain=audioCtx.createGain(); leadGain.gain.value=0.52;
  counterGain=audioCtx.createGain(); counterGain.gain.value=0.28;
  bassGain=audioCtx.createGain(); bassGain.gain.value=0.40;
  arpGain=audioCtx.createGain(); arpGain.gain.value=0.08;
  [leadGain,counterGain,bassGain,arpGain].forEach(g=>g.connect(bgmGain));
}
function softTone(freq,dur=0.12,vol=0.5,pitchEnd=0){
  if(!soundEnabled||!audioReady) return;
  try{
    const now=audioCtx.currentTime;
    const osc=audioCtx.createOscillator(),harm=audioCtx.createOscillator();
    const env=audioCtx.createGain(),lp=audioCtx.createBiquadFilter();
    lp.type="lowpass"; lp.frequency.value=1600;
    osc.connect(lp); harm.connect(lp); lp.connect(env); env.connect(sfxGain);
    osc.type="triangle"; osc.frequency.setValueAtTime(freq,now);
    harm.type="sine"; harm.frequency.setValueAtTime(freq*0.5,now);
    if(pitchEnd&&pitchEnd!==freq){ osc.frequency.exponentialRampToValueAtTime(pitchEnd,now+dur); harm.frequency.exponentialRampToValueAtTime(pitchEnd*0.5,now+dur); }
    const atk=Math.min(0.012,dur*0.12);
    env.gain.setValueAtTime(0,now); env.gain.linearRampToValueAtTime(vol,now+atk);
    env.gain.setValueAtTime(vol*0.7,now+dur*0.5); env.gain.linearRampToValueAtTime(0,now+dur+0.02);
    osc.start(now); osc.stop(now+dur+0.03); harm.start(now); harm.stop(now+dur+0.03);
  }catch(e){}
}

const LOBBY_DUR=LEAD.reduce((s,[,b])=>s+b,0)*BEAT;
const GAME_DUR=GAME_LEAD.reduce((s,[,b])=>s+b,0)*BEAT;
let bgmState=null,bgmLoopTimer=null,scheduledUntil=0;
function scheduleNote(freq,startT,dur,type,gainNode,vol=1.0){
  if(!soundEnabled||!audioReady||freq<=0) return;
  const osc=audioCtx.createOscillator(),env=audioCtx.createGain();
  osc.connect(env); env.connect(gainNode); osc.type=type; osc.frequency.setValueAtTime(freq,startT);
  const atk=Math.min(0.015,dur*0.1),rel=Math.min(0.06,dur*0.25);
  env.gain.setValueAtTime(0,startT); env.gain.linearRampToValueAtTime(vol,startT+atk);
  env.gain.setValueAtTime(vol,startT+dur-rel); env.gain.linearRampToValueAtTime(0,startT+dur+0.01);
  osc.start(startT); osc.stop(startT+dur+0.02);
}
function schedulePattern(pat,startT,type,gainNode,vol=1.0){
  let t=startT; pat.forEach(([f,b])=>{scheduleNote(f,t,b*BEAT,type,gainNode,vol);t+=b*BEAT;});
}
function scheduleKick(t){
  if(!soundEnabled||!audioReady) return;
  const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.connect(g); g.connect(bgmGain); osc.type="sine";
  osc.frequency.setValueAtTime(200,t); osc.frequency.exponentialRampToValueAtTime(45,t+0.18);
  g.gain.setValueAtTime(0.55,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  osc.start(t); osc.stop(t+0.24);
}
function scheduleSnare(t){
  if(!soundEnabled||!audioReady) return;
  const len=Math.floor(audioCtx.sampleRate*0.12),buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
  flt.type="bandpass"; flt.frequency.value=2800; flt.Q.value=0.7;
  src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(0.30,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  src.start(t); src.stop(t+0.14);
}
function scheduleHihat(t,open=false){
  if(!soundEnabled||!audioReady) return;
  const len=Math.floor(audioCtx.sampleRate*(open?0.12:0.03)),buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
  flt.type="highpass"; flt.frequency.value=9000;
  src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(open?0.12:0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+(open?0.12:0.03));
  src.start(t); src.stop(t+(open?0.14:0.04));
}
function scheduleDrums(startT,bars=2){
  const barLen=4*BEAT;
  for(let b=0;b<bars;b++){
    const t=startT+b*barLen;
    [0,2].forEach(beat=>scheduleKick(t+beat*BEAT));
    [1,3].forEach(beat=>scheduleSnare(t+beat*BEAT));
    for(let h=0;h<8;h++) scheduleHihat(t+h*0.5*BEAT,h===3||h===7);
  }
}
function startBGM(track){
  if(!audioReady) return; if(bgmState===track) return;
  stopBGM(); bgmState=track;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(soundEnabled?0.18:0,audioCtx.currentTime);
  scheduledUntil=audioCtx.currentTime+0.05; scheduleBGMChunk();
}
function stopBGM(){
  bgmState=null; if(bgmLoopTimer){clearTimeout(bgmLoopTimer);bgmLoopTimer=null;}
  if(!audioReady) return;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.08);
}
function scheduleBGMChunk(){
  if(!bgmState||!audioReady) return;
  const LOOKAHEAD=2.5,now=audioCtx.currentTime;
  while(scheduledUntil<now+LOOKAHEAD){
    const t=scheduledUntil;
    if(bgmState==="menu"){
      schedulePattern(LEAD,t,"square",leadGain,1.0); schedulePattern(COUNTER,t,"triangle",counterGain,1.0);
      schedulePattern(BASS,t,"sawtooth",bassGain,1.0); schedulePattern(ARP,t,"sine",arpGain,1.0);
      scheduledUntil=t+LOBBY_DUR;
    } else if(bgmState==="game"){
      schedulePattern(GAME_LEAD,t,"square",leadGain,1.0); schedulePattern(GAME_BASS,t,"sawtooth",bassGain,1.0);
      scheduleDrums(t,2); scheduledUntil=t+GAME_DUR;
    }
  }
  bgmLoopTimer=setTimeout(scheduleBGMChunk,600);
}
function applyMuteState(){
  if(!audioReady) return;
  bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
  bgmGain.gain.setValueAtTime(soundEnabled?0.18:0,audioCtx.currentTime);
  if(soundEnabled&&bgmState&&!bgmLoopTimer){scheduledUntil=audioCtx.currentTime+0.05;scheduleBGMChunk();}
}

// ── NETWORK ───────────────────────────────────────────────────────────────────
// Architecture: HOST is the central relay for all 4 players.
// Every guest sends their own gamestate to host.
// Host forwards each guest's state to all OTHER guests.
// Host also broadcasts its own state to all guests.
// Result: every player has all 4 states at all times.

let myPeer=null, hostConn=null, guestConns=[];
let myPlayerId=Math.random().toString(36).slice(2,8).toUpperCase();
let lobbyPeers={}; // id → { name, ready, conn (host only) }
let lobby={ code:null,required:2,players:0,role:null,hostName:"HOST",hostReady:false,hostPeerId:null };
let leaveLobbyConfirm=false,myReady=false,lobbyReadyCount=0;
let countdownActive=false,countdownValue=3,countdownInterval=null;
let joinInput="",joinErrorMsg="",joinConnecting=false;
let isOnlineGame=false, localPlayerIdx=0, gameSessionId=0;

// Per-player network state (indexed 0-3 by join order)
// localPlayerIdx = my slot. Others are remote.
let remoteStates = {}; // peerId → { score, combo, dead, rows, falling, typed }

const SEND_INTERVAL_MS = 50;
let lastSendTime = 0;

function generateCode(){return Math.random().toString(36).substring(2,7).toUpperCase();}

async function hostGame(){
  lobby.code=generateCode(); lobby.players=1; lobby.role="host";
  lobbyPeers={}; myReady=false; lobbyReadyCount=0; countdownActive=false; countdownValue=3;
  state="lobby_wait";
  if(myPeer) myPeer.destroy();
  myPeer=new Peer("wArena-"+lobby.code);
  myPeer.on("open",()=>{
    myPeer.on("connection",(conn)=>{
      conn.on("open",()=>{
        guestConns.push(conn);
        conn.on("data",(data)=>{
          if(data.type==="gamestate"||data.type==="wordcleared") onGameMsg(data, conn);
          else onLobbyMsg(data, conn);
        });
        // Send welcome with current peer list
        conn.send({type:"welcome",from:myPlayerId,name:username||"HOST",
          hostReady:myReady,hostPeerId:myPlayerId,
          peers:Object.entries(lobbyPeers).map(([id,p])=>({id,name:p.name,ready:p.ready||false}))});
      });
      conn.on("close",()=>{
        guestConns=guestConns.filter(c=>c!==conn);
        if(conn._peerId) { delete lobbyPeers[conn._peerId]; delete remoteStates[conn._peerId]; }
        lobby.players=Object.keys(lobbyPeers).length+1;
        lobbyReadyCount=Object.values(lobbyPeers).filter(p=>p.ready).length+(myReady?1:0);
        broadcastLobby({type:"joined",from:"__disconnect__",name:"",total:lobby.players,
          hostPeerId:myPlayerId,peers:Object.entries(lobbyPeers).map(([id,p])=>({id,name:p.name,ready:p.ready}))});
        if(countdownActive){countdownActive=false;if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}sfxMiss();}
      });
    });
  });
  myPeer.on("error",(e)=>console.warn("Host error:",e));
}

function joinGame(){joinInput="";joinErrorMsg="";joinConnecting=false;state="joingame";}

async function submitJoinCode(){
  const val=joinInput.toUpperCase().trim();
  if(val.length<3){joinErrorMsg="ENTER A CODE!";sfxMiss();return;}
  joinConnecting=true; joinErrorMsg=""; lobby.code=val; lobby.role="join";

  if(myPeer) myPeer.destroy();

      hostConn.send({type:"join",from:myPlayerId,name:username||"P?"});
      hostConn.on("data",(data)=>{

        else onLobbyMsg(data, hostConn);
      });
    });
    hostConn.on("error",()=>{joinConnecting=false;joinErrorMsg="CANNOT CONNECT!";sfxMiss();});
    hostConn.on("close",()=>{joinConnecting=false;joinErrorMsg="HOST DISCONNECTED";});
  });

  setTimeout(()=>{if(joinConnecting){joinConnecting=false;joinErrorMsg="TIMEOUT";sfxMiss();}},8000);

function onLobbyMsg(data, fromConn){
  const {type,from,name,peers}=data;
  if(type==="welcome"){
    if(peers) peers.forEach(p=>{if(p.id!==myPlayerId) lobbyPeers[p.id]={name:p.name,ready:p.ready||false};});
    lobby.hostName=name||"HOST"; lobby.hostReady=data.hostReady||false; lobby.hostPeerId=data.hostPeerId||from;
    lobby.players=Object.keys(lobbyPeers).length+2;
    lobbyReadyCount=Object.values(lobbyPeers).filter(p=>p.ready).length+(myReady?1:0)+(lobby.hostReady?1:0);
    sfxPlayerJoin();
  } else if(type==="join"){
    if(!lobbyPeers[from]) sfxPlayerJoin();
    lobbyPeers[from]={name:name||from,ready:false,conn:fromConn};
    if(fromConn) fromConn._peerId=from;
    lobby.players=Object.keys(lobbyPeers).length+1;
    broadcastLobby({type:"joined",from,name,total:lobby.players,hostPeerId:myPlayerId,
      peers:Object.entries(lobbyPeers).map(([id,p])=>({id,name:p.name,ready:p.ready}))});
  } else if(type==="joined"){
    const isDisc=(from==="__disconnect__");
    if(data.peers){
      Object.keys(lobbyPeers).forEach(id=>{if(!data.peers.find(p=>p.id===id)&&id!==myPlayerId) delete lobbyPeers[id];});
      data.peers.forEach(p=>{if(p.id!==myPlayerId) lobbyPeers[p.id]={name:p.name,ready:p.ready||false};});
    } else if(!isDisc&&!lobbyPeers[from]) lobbyPeers[from]={name:name||from,ready:false};
    if(data.hostPeerId) lobby.hostPeerId=data.hostPeerId;
    lobby.players=data.total||Object.keys(lobbyPeers).length+1;
    lobbyReadyCount=Object.values(lobbyPeers).filter(p=>p.ready).length+(myReady?1:0)+(lobby.role==="join"&&lobby.hostReady?1:0);
    if(!isDisc) sfxPlayerJoin(); else sfxMiss();
  } else if(type==="ready"){
    if(lobbyPeers[from]) lobbyPeers[from].ready=data.isReady;
    lobbyReadyCount=Object.values(lobbyPeers).filter(p=>p.ready).length+(myReady?1:0);
    if(data.isReady) sfxPlayerJoin(); else sfxBack();
    if(lobby.role==="host") broadcastLobby({type:"readystate",from,isReady:data.isReady,readyCount:lobbyReadyCount,total:lobby.players});
  } else if(type==="readystate"){
    const who=data.from||from;
    const isHost=lobby.role==="join"&&who===lobby.hostPeerId;
    if(isHost) lobby.hostReady=data.isReady;
    else if(lobbyPeers[who]) lobbyPeers[who].ready=data.isReady;
    if(data.total) lobby.players=data.total;
    lobbyReadyCount=data.readyCount;
    if(data.isReady) sfxPlayerJoin(); else sfxBack();
  } else if(type==="countdown"){
    countdownActive=true; countdownValue=data.value;
    if(data.value>0) sfxCountdownBeep();
    else { sfxCountdownGo(); startGame("multi",lobby.required); }
  } else if(type==="gameseed"){
    // Save seed values — these must survive the upcoming resetAll() call in startGame
    multiGameSeed    = data.seed;
    multiGameStartMs = data.startMs;
    lastSpawnTick    = -1;
    // Set our slot from host's authoritative order
    if(data.slotOrder){
      const mySlot = data.slotOrder.indexOf(myPlayerId);
      if(mySlot !== -1) localPlayerIdx = mySlot;
    }
  } else if(type==="rematchvote"){
    rematchVotes[from] = data.playAgain;
    if(lobby.role==="host") broadcastLobby({type:"rematchvote", from, playAgain:data.playAgain, name:data.name});
    if(!data.playAgain){
      // This peer is leaving — remove them
      delete lobbyPeers[from]; delete remoteStates[from];
      lobby.players = Object.keys(lobbyPeers).length+1;
    } else {
      // This peer wants to play again — they'll show up in lobby_wait
      if(lobbyPeers[from]) lobbyPeers[from].ready = false;
    }

  } else if(type==="rematchresult"){
    // No longer used but kept for safety
    if(data.leaving) data.leaving.forEach(id=>{ delete lobbyPeers[id]; delete remoteStates[id]; });
    returnToLobby();

  } else if(type==="leave"){
    delete lobbyPeers[from]; delete remoteStates[from];
    lobby.players=lobby.role==="host"?Object.keys(lobbyPeers).length+1:Object.keys(lobbyPeers).length+2;
    lobbyReadyCount=Object.values(lobbyPeers).filter(p=>p.ready).length+(myReady?1:0)+(lobby.role==="join"&&lobby.hostReady?1:0);
    if(countdownActive){countdownActive=false;countdownValue=3;sfxMiss();}
  }
}

// ── GAME STATE RELAY ──────────────────────────────────────────────────────────
// Host: receives from guests, relays to all others + self draws
// Guest: sends to host, receives relayed states from host

function onGameMsg(data, fromConn){
  if(data.type==="wordcleared"){
    // Immediately clear the falling word for that player on this screen
    const slot = data.slotIdx;
    if(slot!==undefined && players[slot] && slot!==localPlayerIdx){
      players[slot].falling = null;
      players[slot].spawnTimer = 0;
      // Sync score/combo too
      if(data.score!==undefined) players[slot].score = data.score;
      if(data.combo!==undefined) players[slot].combo = data.combo;
      // Sync rows immediately so stacked words appear without waiting for next heartbeat
      if(data.rows!==undefined) players[slot].rows = data.rows;
    }
    // Host relays to other guests
    if(lobby.role==="host"){
      guestConns.forEach(conn=>{
        if(conn!==fromConn){try{conn.send(data);}catch(e){}}
      });
    }
    return;
  }

  if(data.type!=="gamestate") return;
  const senderId=data.from;
  if(!senderId) return;

  // Store this sender's state
  if(!remoteStates[senderId]) remoteStates[senderId]={};
  const rs=remoteStates[senderId];
  rs.score=data.score; rs.combo=data.combo; rs.dead=data.dead;
  rs.typed=data.typed||"";
  if(data.rows!==undefined) rs.rows=data.rows;
  if(data.falling!==undefined) rs.falling=data.falling; // null or {text,col,yRatio,speed}
  if(data.slotIdx!==undefined) rs.slotIdx=data.slotIdx;

  // HOST RELAY: forward this state to all OTHER guests
  if(lobby.role==="host"){
    guestConns.forEach(conn=>{
      if(conn!==fromConn){ try{conn.send(data);}catch(e){} }
    });
  }
}

function sendGameState(){
  if(!isOnlineGame) return;
  const now=Date.now();
  if(now-lastSendTime<SEND_INTERVAL_MS) return;
  lastSendTime=now;
  const me=players[localPlayerIdx];
  if(!me) return;
  const data={
    type:"gamestate", from:myPlayerId,
    score:me.score, combo:me.combo, dead:me.dead,
    typed:me.typed||"",
    slotIdx:localPlayerIdx,
    // rows always sent so remote panes show correct stacked words immediately
    rows:me.rows,
    // falling NOT sent — deterministic coordinator runs identically on every
    // browser, so all players already see the same word at the same position.
  };
  if(lobby.role==="host"){
    guestConns.forEach(conn=>{try{conn.send(data);}catch(e){} });
  } else {
    if(hostConn){try{hostConn.send(data);}catch(e){}}
  }
}

function broadcastLobby(data){guestConns.forEach(c=>{try{c.send(data);}catch(e){} });}
function sendToHost(data){if(hostConn){try{hostConn.send(data);}catch(e){} }}
function sendLobby(data){if(lobby.role==="host") broadcastLobby(data); else sendToHost(data);}
function isOnlineConnected(){return myPeer&&myPeer.open;}

function leaveLobbyChannel(){
  sendLobby({type:"leave",from:myPlayerId});
  if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}
  countdownActive=false; countdownValue=3; myReady=false; lobbyReadyCount=0;
  if(hostConn){try{hostConn.close();}catch(e){} hostConn=null;}
  guestConns.forEach(c=>{try{c.close();}catch(e){} }); guestConns=[];
  if(myPeer){try{myPeer.destroy();}catch(e){} myPeer=null;}
  lobbyPeers={}; remoteStates={};
}

function startCountdown(){
  countdownActive=true; countdownValue=3; sfxCountdownBeep();
  const guestIds   = Object.keys(lobbyPeers);
  const slotOrder  = [myPlayerId, ...guestIds];
  localPlayerIdx   = 0;
  // Generate seed once — used by host AND sent to guests
  const seed       = Math.floor(Date.now() % 999983);
  const startMs    = Date.now() + 3300; // 3 s countdown + 300ms buffer
  // Set on host immediately
  multiGameSeed    = seed;
  multiGameStartMs = startMs;
  lastSpawnTick    = -1;
  // Broadcast countdown start
  broadcastLobby({type:"countdown", value:3, diff:"multi"});
  // Send seed + slot order to all guests so they use identical values
  broadcastLobby({type:"gameseed", seed, startMs, slotOrder});
  countdownInterval = setInterval(()=>{
    countdownValue--;
    if(countdownValue>0){
      sfxCountdownBeep();
      broadcastLobby({type:"countdown", value:countdownValue, diff:"multi"});
    } else {
      clearInterval(countdownInterval); countdownInterval=null; sfxCountdownGo();
      broadcastLobby({type:"countdown", value:0, diff:"multi"});
      setTimeout(()=>startGame("multi", lobby.required), 200);
    }
  }, 1000);
}

// ── REMATCH VOTING ────────────────────────────────────────────────────────────
let myRematchVote  = null;   // null=not voted, true=play again, false=menu
let rematchVotes   = {};     // { peerId: true/false }
let rematchTimeout = null;
let rematchTimeLeft = 15;    // seconds remaining shown on screen
let rematchTickInterval = null;
const REMATCH_TIMEOUT_MS = 15000;

function initRematch(){
  myRematchVote  = null;
  rematchVotes   = {};
  rematchTimeLeft = 15;
  if(rematchTimeout) clearTimeout(rematchTimeout);
  if(rematchTickInterval) clearInterval(rematchTickInterval);
  // Tick down the countdown display every second
  rematchTickInterval = setInterval(()=>{
    rematchTimeLeft = Math.max(0, rematchTimeLeft - 1);
  }, 1000);
  // Auto-go-to-menu after 15s
  rematchTimeout = setTimeout(()=>{
    if(rematchTickInterval){ clearInterval(rematchTickInterval); rematchTickInterval=null; }
    if(state!=="gameover_multi"||myRematchVote!==null) return;
    // Time's up — go to menu
    myRematchVote = false;
    leaveLobbyChannel(); state="menu"; resetAll(); startBGM("menu");
  }, REMATCH_TIMEOUT_MS);
}

function castRematchVote(playAgain){
  if(myRematchVote!==null) return;
  myRematchVote = playAgain;
  if(rematchTimeout){ clearTimeout(rematchTimeout); rematchTimeout=null; }
  if(rematchTickInterval){ clearInterval(rematchTickInterval); rematchTickInterval=null; }

  // Notify others of our decision
  const msg = {type:"rematchvote", from:myPlayerId, playAgain, name: username||"P?"};
  if(lobby.role==="host") broadcastLobby(msg);
  else sendToHost(msg);

  if(!playAgain){
    // Going to menu immediately
    leaveLobbyChannel(); state="menu"; resetAll(); startBGM("menu");
    return;
  }

  // Play Again — go to lobby immediately, wait for others there
  if(lobby.role==="host"){
    // Host resets lobby and waits
    returnToLobby();
  } else {
    // Guest goes to lobby_wait — host is already waiting there (or will rejoin)
    returnToLobby();
  }
}

function returnToLobby(){
  myReady=false; lobbyReadyCount=0;
  countdownActive=false; countdownValue=3;
  if(countdownInterval){ clearInterval(countdownInterval); countdownInterval=null; }
  // Reset ready flags but keep connections alive
  Object.keys(lobbyPeers).forEach(id=>{ if(lobbyPeers[id]) lobbyPeers[id].ready=false; });
  if(lobby.role==="join") lobby.hostReady=false;
  lobby.players = Object.keys(lobbyPeers).length+1;
  state="lobby_wait"; startBGM("menu");
}

// ── PLAYER STATE ──────────────────────────────────────────────────────────────
function makePlayerState(id,color,name){
  return {id,color,name,rows:[],falling:null,typed:"",score:0,combo:0,
    lastEscDanger:-1,escFlashTimer:0,escFlashLabel:"",
    spawnTimer:0,particles:[],dead:false,pendingSpawn:null,landingFlash:null};
}
let players=[];
let lastStanding=null,lastStandingTimer=0;

// ── MULTI SPAWN COORDINATOR ────────────────────────────────────────────────────
let multiGameSeed=0,multiGameStartMs=0,lastSpawnTick=-1;
let multiSpawnInterval=130,multiRoundScore=0,multiCurrentLength=3;

function tickMultiSpawnCoordinator(){
  if(!multiGameStartMs||Date.now()<multiGameStartMs) return;
  const elapsed=Date.now()-multiGameStartMs;
  const alive=players.filter(p=>!p.dead);
  if(alive.length>0) multiRoundScore=alive.reduce((s,p)=>s+p.score,0)/alive.length;
  multiSpawnInterval=Math.max(45,130-multiRoundScore*0.25);
  const intervalMs=(multiSpawnInterval/60)*1000;
  const currentTick=Math.floor(elapsed/intervalMs);
  if(currentTick<=lastSpawnTick) return;
  lastSpawnTick=currentTick;
  const lenSeed=multiGameSeed*1000+currentTick*7919;
  const sharedLength=pickLengthFromSeed(lenSeed,multiRoundScore);
  multiCurrentLength=sharedLength;
  const speedSeed=multiGameSeed*1000+currentTick*7919+99999;
  const esc=getEscalation(multiRoundScore);
  const sharedSpeed=(MULTI_CFG.baseSpeed+seededRand(speedSeed)*MULTI_CFG.rand)*esc.mult;
  const colSeed=multiGameSeed*1000+currentTick*7919+55555;
  const sharedCol=Math.floor(seededRand(colSeed)*4);
  // Assign to ALL non-dead players — including opponents on this browser
  // Every browser runs this same code with the same seed → same word/col/speed
  // for each player slot, so the opponent pane is always in sync visually.
  players.forEach((p)=>{
    if(p.dead) return;
    if(p.falling) return; // already has a word in flight
    const activeSet = new Set(p.rows.map(r=>r.text));
    const wordSeed  = multiGameSeed*1000 + currentTick*7919 + 33331 + p.id*997;
    const wordText  = getMultiWord(sharedLength, activeSet, wordSeed);
    const fallback_x = 40 + sharedCol * 60;
    p.falling = {text:wordText, col:sharedCol, yRatio:0, speed:sharedSpeed, x:fallback_x, y:0};
    p.spawnTimer = 0;
  });
}
function pickLengthFromSeed(seed,avgScore){
  const r=seededRand(seed);
  let options;
  if(avgScore<30) options=[3,3,3,4,4]; else if(avgScore<70) options=[3,4,4,4,5];
  else if(avgScore<130) options=[4,4,5,5,6]; else if(avgScore<210) options=[5,6,6,7,8];
  else if(avgScore<320) options=[6,7,8,9,10]; else options=[8,9,10,11,12,13];
  const valid=options.filter(l=>WORDS_BY_LENGTH[l]);
  if(!valid.length) return AVAILABLE_LENGTHS[Math.floor(r*AVAILABLE_LENGTHS.length)];
  return valid[Math.floor(r*valid.length)];
}
function getMultiWord(targetLength, activeSet, playerSeed){
  const candidates = WORDS_BY_LENGTH[targetLength]||[];
  const available  = candidates.filter(w=>!activeSet.has(w));
  const pool       = available.length>0 ? available : candidates;
  if(pool.length===0){
    const fb = WORDS_MULTI.filter(({w})=>!activeSet.has(w)&&Math.abs(w.length-targetLength)<=2);
    const src = fb.length>0 ? fb : WORDS_MULTI;
    return src[Math.floor(seededRand(playerSeed)*src.length)].w||src[0].w;
  }
  return pool[Math.floor(seededRand(playerSeed)*pool.length)];
}

// ── SINGLE PLAYER STATE ───────────────────────────────────────────────────────
let singleRows=[],singleFalling=null,singleTyped="",singleScore=0,singleCombo=0;
let singleLastEscDanger=-1,singleEscFlashTimer=0,singleEscFlashLabel="";
let singleSpawnTimer=0,singleParticles=[];
let singleTotalKeys=0,singleCorrectWords=0,singleWrongSubmits=0;
let singleNextWord=null,singleGameStartTime=0,singlePausedMs=0,singlePauseStartTime=0;

function pickNextWord(){
  const pool=WORDS[difficulty]||WORDS.easy;
  const col=Math.floor(Math.random()*COLS.length);
  const active=new Set();
  if(singleFalling) active.add(singleFalling.text);
  singleRows.forEach(r=>active.add(r.text));
  const available=pool.filter(w=>!active.has(w));
  const src=available.length>0?available:pool;
  return{text:src[Math.floor(Math.random()*src.length)],col,x:COLS[col]};
}

// ── START / RESET ─────────────────────────────────────────────────────────────
function startGame(diff,numPlayers){
  state="game"; difficulty=diff; playerCount=numPlayers||1; paused=false;
  isOnlineGame=(numPlayers>1&&isOnlineConnected());
  if(!isOnlineGame) localPlayerIdx=0;
  if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}
  countdownActive=false; countdownValue=3;
  resetAll();
  startBGM("game");
}
function resetAll(){
  gameSessionId++;
  singleRows=[]; singleFalling=null; singleTyped=""; singleScore=0; singleCombo=0;
  singleLastEscDanger=-1; singleEscFlashTimer=0; singleSpawnTimer=0; singleParticles=[];
  singleTotalKeys=0; singleCorrectWords=0; singleWrongSubmits=0;
  singleGameStartTime=Date.now(); singlePausedMs=0; singlePauseStartTime=0;
  singleNextWord=difficulty?pickNextWord():null;
  players=[];
  for(let i=0;i<playerCount;i++){
    const pname=(i===0&&username)?username.toUpperCase():PLAYER_NAMES[i];
    players.push(makePlayerState(i,PLAYER_COLORS[i],pname));
  }
  lastStanding=null; lastStandingTimer=0; multiForfeitConfirm=false;
  myRematchVote=null; rematchVotes={};
  if(rematchTimeout){ clearTimeout(rematchTimeout); rematchTimeout=null; }
  multiSpawnInterval=130; multiRoundScore=0; multiCurrentLength=3; lastSpawnTick=-1;
  // Bug5: do NOT reset multiGameSeed / multiGameStartMs here —
  // they are set by startCountdown (host) or gameseed msg (guest) BEFORE resetAll
  lastSendTime=0;
  // Apply names from lobby
  if(isOnlineGame){
    players[localPlayerIdx].name=username?username.toUpperCase():PLAYER_NAMES[localPlayerIdx];
    const guestList=Object.entries(lobbyPeers);
    guestList.forEach(([pid,peer],i)=>{
      // Use slotIdx from remoteStates if already set by gameseed message (authoritative)
      // Otherwise fall back to sequential assignment offset by our own slot
      let slot;
      if(remoteStates[pid]&&remoteStates[pid].slotIdx!==undefined){
        slot=remoteStates[pid].slotIdx;
      } else {
        // Assign slots sequentially, skipping localPlayerIdx
        const taken=new Set([localPlayerIdx]);
        let assignIdx=0;
        for(let s=0;s<playerCount;s++){
          if(!taken.has(s)){
            if(assignIdx===i){ slot=s; break; }
            assignIdx++;
          }
        }
        if(slot===undefined) slot=i+(localPlayerIdx===0?1:0);
      }
      if(players[slot]) players[slot].name=(peer.name||"P?").toUpperCase();
      if(!remoteStates[pid]) remoteStates[pid]={};
      remoteStates[pid].slotIdx=slot;
    });
  }
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
function singleSubmit(){
  const val=singleTyped.toUpperCase();
  if(singleFalling&&val===singleFalling.text){
    const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy,esc=getEscalation(singleScore);
    const pts=Math.round(cfg.pts*(1+singleCombo*0.1)*(1+esc.danger*0.2));
    singleScore+=pts; singleCombo++; singleCorrectWords++;
    spawnParticles(singleParticles,singleFalling.x+40,singleFalling.y,C.teal,10);
    singleCombo>2?sfxCombo():sfxDestroy(); singleFalling=null; singleSpawnTimer=0; singleTyped=""; return;
  }
  const i=singleRows.findIndex(r=>r.text===val);
  if(i!==-1){
    const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy,esc=getEscalation(singleScore);
    const pts=Math.round(cfg.pts*(1+singleCombo*0.1)*(1+esc.danger*0.2));
    singleScore+=pts; singleCombo++; singleCorrectWords++;
    spawnParticles(singleParticles,COLS[singleRows[i].col]+40,BOTTOM-i*ROW_H,C.green,8);
    singleRows.splice(i,1); singleCombo>2?sfxCombo():sfxDestroy();
  } else { singleCombo=0; singleWrongSubmits++; sfxMiss(); }
  singleTyped="";
}
function multiSubmit(p){
  const val=p.typed.toUpperCase();
  if(p.falling&&val===p.falling.text){
    const esc=getEscalation(p.score),pts=getMultiPts(val,p.combo,esc.danger);
    p.score+=pts; p.combo++;
    spawnParticles(p.particles,p.falling.x??40,p.falling.y??40,p.color,10);
    p.combo>2?sfxCombo():sfxDestroy();
    p.falling=null; p.spawnTimer=0; p.typed="";
    // Instantly notify all peers to clear this word from their screens
    sendWordCleared(p);
    return;
  }
  const i=p.rows.findIndex(r=>r.text===val);
  if(i!==-1){
    const esc=getEscalation(p.score),pts=getMultiPts(val,p.combo,esc.danger);
    p.score+=pts; p.combo++; p.rows.splice(i,1); p.combo>2?sfxCombo():sfxDestroy();
    spawnParticles(p.particles,p.falling?(p.falling.x??40):40,300,p.color,8);
  } else { p.combo=0; sfxMiss(); }
  p.typed="";
}

function sendWordCleared(p){
  if(!isOnlineGame) return;
  const msg={
    type:"wordcleared",
    from:myPlayerId,
    slotIdx:localPlayerIdx,
    score:p.score,
    combo:p.combo,
    // include rows so remote screens update stacked words immediately
    // without waiting for the next gamestate heartbeat
    rows:p.rows,
  };
  if(lobby.role==="host") guestConns.forEach(c=>{try{c.send(msg);}catch(e){}});
  else if(hostConn){try{hostConn.send(msg);}catch(e){}}
}

    if(/^[a-zA-Z0-9]$/.test(e.key)&&joinInput.length<8){joinInput+=e.key.toUpperCase();joinErrorMsg="";}
    return;
  }
  if(state!=="game") return;
  if(playerCount===1){
    if(e.key==="Escape"){paused=!paused;if(paused){singlePauseStartTime=Date.now();bgmGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.15);}else{singlePausedMs+=Date.now()-singlePauseStartTime;bgmGain.gain.linearRampToValueAtTime(soundEnabled?0.18:0,audioCtx.currentTime+0.15);}sfxClick();return;}
    if(paused) return;
    if(e.key==="Backspace") singleTyped=singleTyped.slice(0,-1);
    else if(e.key==="Enter") singleSubmit();
    else if(/^[a-zA-Z]$/.test(e.key)){singleTyped+=e.key.toUpperCase();singleTotalKeys++;sfxType();}
  } else {
    if(e.key==="Escape"){
      multiForfeitConfirm=!multiForfeitConfirm;
      if(multiForfeitConfirm) bgmGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.15);
      else bgmGain.gain.linearRampToValueAtTime(soundEnabled?0.18:0,audioCtx.currentTime+0.15);
      sfxClick();return;
    }
    if(multiForfeitConfirm) return;
    const p=players[localPlayerIdx];
    if(!p||p.dead) return;
    if(e.key==="Backspace") p.typed=p.typed.slice(0,-1);
    else if(e.key==="Enter") multiSubmit(p);
    else if(/^[a-zA-Z]$/.test(e.key)){p.typed+=e.key.toUpperCase();sfxType();}

});

// ── BACKGROUND ────────────────────────────────────────────────────────────────
function bg(){
  frameN++; const t=Date.now()*0.002;
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,C.bg1); g.addColorStop(1,C.bg2);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=C.grid; ctx.lineWidth=1;
  for(let x=0;x<W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let i=0;i<40;i++){const x=(i*40+Math.sin(t+i)*20)%W,y=TOP+(i*30+Math.cos(t+i)*30)%(BOTTOM-TOP);ctx.fillStyle=C.dot;ctx.fillRect(x-1,y-1,3,3);}

// ── DRAW PANE ─────────────────────────────────────────────────────────────────
// Used for BOTH the local player's main pane and opponents' mini panes.
// px,py,pw,ph = bounding box on canvas
// isLocal: true = physics run here; false = animate from network state
function drawPane(p, px, py, pw, ph, isLocal){
  const isNarrow=pw<180;
  const headerH=isNarrow?24:36, inputH=isNarrow?28:44;
  const PLAY_H=ph-headerH-inputH;
  const pTop=py+headerH, pBottom=py+ph-inputH;
  const nCols=4;
  const colStep=Math.floor((pw-16)/nCols);
  const pCols=Array.from({length:nCols},(_,i)=>8+i*colStep);
  const pRowH=isNarrow?20:30;
  const esc=getEscalation(p.score);

  ctx.save();
  ctx.beginPath(); ctx.rect(px,py,pw,ph); ctx.clip();

  // Background
  ctx.fillStyle=`rgba(3,3,14,${isNarrow?0.75:0.82})`;
  ctx.fillRect(px,py,pw,ph);

  // Colour glow border
  ctx.strokeStyle=`rgba(${hexRgb(p.color)},${isNarrow?0.55:0.30})`;
  ctx.lineWidth=isNarrow?1.5:1;
  ctx.strokeRect(px+1,py+1,pw-2,ph-2);

  // Danger overlay
  if(esc.danger>=3){const pulse=0.04+0.04*Math.sin(Date.now()*0.008);ctx.fillStyle=`rgba(255,20,50,${pulse})`;ctx.fillRect(px,py,pw,ph);}
  else if(esc.danger>=2){const pulse=0.02+0.02*Math.sin(Date.now()*0.005);ctx.fillStyle=`rgba(255,120,0,${pulse})`;ctx.fillRect(px,py,pw,ph);}

  // Escalation detection (local only)
  if(isLocal&&esc.danger>p.lastEscDanger){p.lastEscDanger=esc.danger;p.escFlashTimer=90;p.escFlashLabel=esc.label;sfxCombo();}

  // ── PHYSICS ──────────────────────────────────────────────────────────────
  if(p.falling){
    // advance yRatio relative to this pane's PLAY_H so visual speed
    // is identical whether pane is large (main) or small (mini)
    p.falling.yRatio = (p.falling.yRatio||0) + p.falling.speed / PLAY_H;
    const limitRatio = Math.max(0, (PLAY_H - p.rows.length*pRowH) / PLAY_H);
    if(p.falling.yRatio >= limitRatio){
      if(isLocal){
        // Only local player runs landing physics, row stacking, and game-over check
        p.rows.push({text:p.falling.text, col:p.falling.col}); sfxLand();
        spawnParticles(p.particles, px+pCols[p.falling.col%nCols]+10, pTop+limitRatio*PLAY_H, C.amber, 5);
        p.landingFlash = {text:p.falling.text, col:p.falling.col, yRatio:limitRatio, timer:8};
        const maxRows = Math.max(3, Math.floor((PLAY_H-10)/pRowH));
        if(p.rows.length > maxRows) p.dead = true;
        // Reset falling word only for local player — coordinator will assign next
        p.falling = p.pendingSpawn||null; p.pendingSpawn=null; p.spawnTimer=0;
      }
      // For remote players: let the falling word stay clamped at the bottom
      // visually until the coordinator assigns a new word (next tick).
      // Rows are synced via network (gamestate rows field), NOT pushed locally.
      // This prevents the word from vanishing before the network row-sync arrives.
    }
  }

  // ── DRAW ROWS ─────────────────────────────────────────────────────────────
  for(let i=0;i<p.rows.length;i++){
    const r=p.rows[i],wx=px+pCols[r.col%nCols],wy=pBottom-i*pRowH;
    const fontSize=isNarrow?7:10;
    ctx.font=`${fontSize}px ${PX}`; const tw=ctx.measureText(r.text).width;
    const dangerRatio=p.rows.length/12;
    const rowClr=dangerRatio>0.7?C.red:dangerRatio>0.4?C.amber:C.green;
    ctx.fillStyle=`rgba(0,180,120,${0.05+dangerRatio*0.1})`; ctx.fillRect(wx-3,wy-fontSize-2,tw+6,fontSize+6);
    ctx.strokeStyle=`rgba(${dangerRatio>0.7?"255,60,80":dangerRatio>0.4?"255,180,0":"0,230,150"},0.4)`;
    ctx.lineWidth=1; ctx.strokeRect(wx-3,wy-fontSize-2,tw+6,fontSize+6);
    pxDraw(r.text,wx,wy,rowClr,fontSize,true);
  }

  // ── DRAW FALLING WORD ─────────────────────────────────────────────────────
  if(p.falling){
    const fx=px+pCols[p.falling.col%nCols];
    const fyPx=pTop+(p.falling.yRatio||0)*PLAY_H;
    p.falling.x=fx; p.falling.y=fyPx; // for particle spawning
    const fontSize=isNarrow?8:11;
    ctx.font=`${fontSize}px ${PX}`; const tw=ctx.measureText(p.falling.text).width;
    const len=p.falling.text.length;
    const wordClr=len<=3?C.green:len<=5?C.teal:len<=8?C.amber:C.red;
    ctx.fillStyle="rgba(0,180,255,0.10)"; ctx.fillRect(fx-3,fyPx-fontSize-2,tw+6,fontSize+6);
    ctx.strokeStyle="rgba(0,200,255,0.45)"; ctx.lineWidth=1; ctx.strokeRect(fx-3,fyPx-fontSize-2,tw+6,fontSize+6);
    pxDraw(p.falling.text,fx,fyPx,wordClr,fontSize,true);
    // Length badge (mini only)
    if(isNarrow){
      const ls=`${p.falling.text.length}`;
      ctx.font=`5px ${PX}`; const lbw=ctx.measureText(ls).width;
      ctx.fillStyle=`rgba(${hexRgb(wordClr)},0.85)`; ctx.fillRect(fx+tw+3,fyPx-fontSize-2,lbw+3,8);
      ctx.fillStyle="#000"; ctx.fillText(ls,fx+tw+5,fyPx-fontSize+3);
    }
  }

  // ── LANDING FLASH ─────────────────────────────────────────────────────────
  if(p.landingFlash){
    if(!p.dead) p.landingFlash.timer--;
    if(p.landingFlash.timer<=0){ p.landingFlash=null; }
    else{
      const lf=p.landingFlash,fx=px+pCols[lf.col%nCols],fyPx=pTop+lf.yRatio*PLAY_H;
      const fontSize=isNarrow?8:11;
      ctx.globalAlpha=(lf.timer/8)*0.7; ctx.font=`${fontSize}px ${PX}`;
      const tw=ctx.measureText(lf.text).width;
      ctx.fillStyle="#ffffff"; ctx.fillRect(fx-3,fyPx-fontSize-2,tw+6,fontSize+6);
      ctx.globalAlpha=1;
    }
  }

  // ── PARTICLES ─────────────────────────────────────────────────────────────
  for(let i=p.particles.length-1;i>=0;i--){
    const pt=p.particles[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.12; pt.life-=0.04;
    if(pt.life<=0){p.particles.splice(i,1);continue;}
    ctx.globalAlpha=pt.life; ctx.fillStyle=pt.color; ctx.fillRect(pt.x,pt.y,pt.size,pt.size);
  }
  ctx.globalAlpha=1;

  // ── HEADER ────────────────────────────────────────────────────────────────
  ctx.fillStyle="rgba(3,3,18,0.94)"; ctx.fillRect(px,py,pw,headerH);
  ctx.fillStyle=p.color; ctx.fillRect(px,py+headerH-2,pw,2);
  const nameFontSz=isNarrow?5:7;
  ctx.font=`${nameFontSz}px ${PX}`;
  const dispName=isNarrow&&p.name.length>6?p.name.slice(0,6):p.name;
  const nw=ctx.measureText(dispName).width;
  ctx.shadowColor=p.color; ctx.shadowBlur=6; ctx.fillStyle=p.color;
  ctx.fillText(dispName,px+pw/2-nw/2,py+headerH-6); ctx.shadowBlur=0;
  // Score
  if(!isNarrow){
    pxDraw(`${p.score}`,px+5,py+headerH-6,C.amber,7,false);
    if(p.combo>1){const cs=`x${p.combo}`;ctx.font=`6px ${PX}`;const cw=ctx.measureText(cs).width;pxDraw(cs,px+pw-cw-5,py+headerH-6,p.combo>=5?C.amber:C.green,6,false);}
  } else {
    ctx.font=`5px ${PX}`; ctx.fillStyle=C.amber; ctx.fillText(`${p.score}`,px+3,py+headerH-5);
  }

  // Active pulse border
  if(isLocal){
    const ta=Date.now()*0.006,alpha=0.4+0.35*Math.sin(ta);
    ctx.strokeStyle=`rgba(${hexRgb(p.color)},${alpha.toFixed(2)})`;
    ctx.lineWidth=2; ctx.strokeRect(px+1,py+1,pw-2,ph-2);
  }

  // ── INPUT BAR ─────────────────────────────────────────────────────────────
  ctx.fillStyle="rgba(3,3,18,0.95)"; ctx.fillRect(px,py+ph-inputH,pw,inputH);
  ctx.fillStyle=p.color; ctx.fillRect(px,py+ph-inputH,pw,2);
  if(isLocal&&!p.dead){
    const cursor=Math.floor(Date.now()/400)%2===0?"_":" ";
    const display=p.typed+cursor;
    const inputFontSz=isNarrow?7:9;
    ctx.font=`${inputFontSz}px ${PX}`; const itw=ctx.measureText(display).width;
    pxDraw(display,px+pw/2-itw/2,py+ph-inputH/2+4,p.color,inputFontSz,true);
  } else if(!isLocal){
    // Show remote player's live typed input
    const remTyped=p.typed||"";
    const dotLabel=remTyped.length>0?(isNarrow?remTyped.slice(-4):remTyped):"●";
    const inputFontSz=isNarrow?6:7;
    ctx.font=`${inputFontSz}px ${PX}`; const dlw=ctx.measureText(dotLabel).width;
    ctx.shadowColor=C.green; ctx.shadowBlur=Math.floor(Date.now()/400)%2===0?5:0;
    ctx.fillStyle=remTyped.length>0?p.color:C.green;
    ctx.fillText(dotLabel,px+pw/2-dlw/2,py+ph-inputH/2+4); ctx.shadowBlur=0;
  }

  // ── DEAD OVERLAY ──────────────────────────────────────────────────────────
  if(p.dead){
    ctx.fillStyle="rgba(0,0,0,0.72)"; ctx.fillRect(px,py,pw,ph);
    const dtxt=isNarrow?"OUT":"ELIMINATED";
    ctx.font=`${isNarrow?8:9}px ${PX}`; const dw=ctx.measureText(dtxt).width;
    pxDraw(dtxt,px+pw/2-dw/2,py+ph/2,C.red,isNarrow?8:9,true);
    ctx.font=`${isNarrow?6:7}px ${PX}`; const stxt=`${p.score}`;
    const sw=ctx.measureText(stxt).width;
    pxDraw(stxt,px+pw/2-sw/2,py+ph/2+16,C.amber,isNarrow?6:7,false);
  }

  // ── LAST STANDING BANNER ──────────────────────────────────────────────────
  if(lastStanding&&lastStanding===p&&!p.dead&&isLocal){
    const alpha=Math.min(1,(180-lastStandingTimer)/30);
    ctx.globalAlpha=alpha*(0.7+0.3*Math.sin(Date.now()*0.006));
    ctx.font=`9px ${PX}`; const bt="★ LAST STANDING ★"; const bw=ctx.measureText(bt).width;
    ctx.fillStyle=C.amber; ctx.shadowColor=C.amber; ctx.shadowBlur=12;
    ctx.fillText(bt,px+pw/2-bw/2,py+headerH+20); ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  // Esc flash
  if(isLocal&&p.escFlashTimer>0){
    p.escFlashTimer--;
    const alpha=Math.min(1,p.escFlashTimer/20);
    const flashClr=esc.danger>=3?"#ff2244":esc.danger>=2?"#ffaa00":p.color;
    ctx.globalAlpha=alpha; ctx.font=`11px ${PX}`; const fw=ctx.measureText(p.escFlashLabel).width;
    pxDraw(p.escFlashLabel,px+pw/2-fw/2,py+ph/2,flashClr,11,true); ctx.globalAlpha=1;
  }

  ctx.restore();
}

// ── APPLY REMOTE STATES TO PLAYERS ARRAY ─────────────────────────────────────
// Syncs score, combo, dead, rows, typed from network.
// falling is NOT synced — deterministic coordinator runs on every browser,
// so all panes already show the same falling word at the same position.
function applyRemoteStates(){
  Object.entries(remoteStates).forEach(([pid,rs])=>{
    const slot=rs.slotIdx;
    if(slot===undefined||slot===localPlayerIdx||!players[slot]) return;
    const p=players[slot];
    p.name=(rs.name||(lobbyPeers[pid]?.name)||PLAYER_NAMES[slot]).toUpperCase();
    p.score=rs.score||0; p.combo=rs.combo||0; p.dead=rs.dead||false;
    p.typed=rs.typed||"";
    // Sync rows from network — but NEVER touch p.falling:
    // the coordinator assigns it deterministically on every browser independently
    if(rs.rows!==undefined){
      const prevLen=p.rows.length;
      p.rows=rs.rows;
      // If rows increased, the remote player's word landed — clear the visually
      // clamped falling word so the coordinator can assign the next word this tick.
      if(p.rows.length>prevLen && p.falling){
        p.falling=null; p.spawnTimer=0;
      }
    }
  });
}

// ── GAME SCREENS ──────────────────────────────────────────────────────────────
function game4P(){

  // The local player's pane = large left area
  // The 3 opponents = right column, stacked with gaps
  const me=players[localPlayerIdx];
  const opponents=[0,1,2,3].filter(i=>i!==localPlayerIdx);

  // Draw vertical divider gap
  ctx.fillStyle="rgba(0,0,0,0.9)"; ctx.fillRect(MAIN_W,0,GAP*2,H);
  // Animated divider glow
  const ta=Date.now()*0.003,alpha=0.35+0.2*Math.sin(ta);
  ctx.fillStyle=`rgba(${hexRgb(me.color)},${alpha.toFixed(2)})`; ctx.fillRect(MAIN_W+GAP-1,0,2,H);

  // Draw main pane (local player) — physics run here
  drawPane(me, 0, 0, MAIN_W, MAIN_H, true);

  // Draw 3 opponent mini panes — Bug3: isLocal=false, no row-landing physics
  // Falling word still animates via coordinator (same seed), rows from network
  opponents.forEach((oppIdx,slot)=>{
    const sy=slot*(MINI_H+GAP);
    if(slot>0){ ctx.fillStyle="rgba(0,0,0,0.9)"; ctx.fillRect(MAIN_W+GAP*2,sy-GAP,MINI_W,GAP); }
    drawPane(players[oppIdx], MAIN_W+GAP*2, sy, MINI_W, MINI_H, false);
  });

  checkMultiGameOver();
  drawMultiForfeitOverlay();
}

function checkMultiGameOver(){
  if(state!=="game") return;
  const alive=players.filter(p=>!p.dead);
  if(alive.length===0){
    lastStanding=null; state="gameover_multi"; stopBGM();
    if(playerCount>1) setTimeout(()=>initRematch(), 100);
    return;
  }
  if(alive.length===1&&players.length>1){
    if(!lastStanding||lastStanding!==alive[0]){
      lastStanding=alive[0]; lastStandingTimer=180; sfxFanfare();
    }
    // Bug7: countdown fires gameover when timer expires
    if(lastStandingTimer>0) lastStandingTimer--;
    if(lastStandingTimer<=0){
      state="gameover_multi"; stopBGM();
      if(playerCount>1) setTimeout(()=>initRematch(), 100);
    }
    return;
  }
  if(alive.length>1){ lastStanding=null; lastStandingTimer=0; }
}

// ── SINGLE PLAYER ─────────────────────────────────────────────────────────────
function game(){
  const cfg=DIFF_CFG[difficulty]||DIFF_CFG.easy,esc=getEscalation(singleScore);

  const dynInterval=Math.max(30,cfg.spawnBase-singleScore*0.3);
  if(!paused){
    singleSpawnTimer++;
    if(!singleFalling&&singleSpawnTimer>=dynInterval){
      const speed=(cfg.baseSpeed+Math.random()*cfg.rand)*esc.mult;
      const nw=singleNextWord||pickNextWord();
      singleFalling={text:nw.text,col:nw.col,x:COLS[nw.col],y:0,speed};

    const dangerRatio=singleRows.length/14;

    ctx.fillStyle=`rgba(0,180,120,${0.05+dangerRatio*0.1})`; ctx.fillRect(wx-8,wy-22,tw+16,28);

    ctx.lineWidth=1; ctx.strokeRect(wx-8,wy-22,tw+16,28); pxDraw(r.text,wx,wy,rowClr,13,true);
  }

    singleFalling.y+=singleFalling.speed;
    const limit=BOTTOM-singleRows.length*ROW_H;
    if(singleFalling.y>=limit){singleRows.push({text:singleFalling.text,col:singleFalling.col});sfxLand();spawnParticles(singleParticles,singleFalling.x+40,limit,C.amber,6);singleFalling=null;singleSpawnTimer=0;if(singleRows.length>14)state="gameover";}
  }
  if(singleFalling){
    ctx.font=`14px ${PX}`; const tw=ctx.measureText(singleFalling.text).width;
    const wordClr=esc.danger>=3?C.red:esc.danger>=2?C.amber:C.teal;
    ctx.fillStyle="rgba(0,180,255,0.10)"; ctx.fillRect(singleFalling.x-8,singleFalling.y-24,tw+16,30);
    ctx.strokeStyle="rgba(0,200,255,0.45)"; ctx.lineWidth=1; ctx.strokeRect(singleFalling.x-8,singleFalling.y-24,tw+16,30);

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  bg();
  if(state==="splash")           drawSplash();
  else if(state==="menu")        menu();
  else if(state==="difficulty")  difficultyMenu();
  else if(state==="multiplayer") multiMenu();
  else if(state==="hostjoin")    hostJoinMenu();
  else if(state==="joingame")    drawJoinGame();
  else if(state==="options")     drawOptions();
  else if(state==="howtoplay")   drawHowToPlay();
  else if(state==="lobby_wait")  lobbyWait();
  else if(state==="game"){
    if(playerCount===1) game();
    else if(playerCount===2) game2P();
    else if(playerCount===4) game4P();
  }
  else if(state==="gameover")       gameover();
  else if(state==="gameover_multi") gameover_multi();

  drawMusicIcon();

  if(state!==lastState&&audioReady){
    if(["menu","difficulty","multiplayer","hostjoin","joingame","options","lobby_wait","howtoplay"].includes(state)) startBGM("menu");
    else if(state==="game") startBGM("game");
    lastState=state;
  }
  requestAnimationFrame(loop);
}
loop();
